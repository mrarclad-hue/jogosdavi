<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Airborne Strike - Plane Update</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1e272e; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; }
        
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; z-index: 10; }
        .stat { 
            background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 10px;
            font-size: 18px; font-weight: bold; margin-bottom: 8px; border-left: 5px solid #f1c40f;
        }

        #lvl-display { position: absolute; top: 20px; right: 20px; color: #f1c40f; font-size: 24px; font-weight: bold; text-shadow: 2px 2px #000; }

        #controls-wrapper { 
            position: absolute; bottom: 30px; width: 100%; 
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 0 40px; box-sizing: border-box; pointer-events: none; 
        }
        
        .control-group { display: flex; gap: 25px; pointer-events: auto; }

        #joystick-container { 
            width: 130px; height: 130px; background: rgba(255,255,255,0.1); 
            border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; position: relative; pointer-events: auto;
        }
        #joystick-knob { 
            position: absolute; top: 40px; left: 40px; width: 50px; height: 50px; 
            background: #fff; border-radius: 50%; pointer-events: none;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .action-btn {
            width: 90px; height: 90px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; color: white; 
            font-weight: bold; user-select: none; pointer-events: auto;
            box-shadow: 0 8px #000; transition: transform 0.05s;
            -webkit-user-select: none;
        }
        .action-btn:active { transform: translateY(4px); box-shadow: 0 4px #000; }
        #btn-jump { background: #27ae60; border: 4px solid #1e8449; }
        #btn-shoot { background: #e74c3c; border: 4px solid #c0392b; }
        
        #msg-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); color: white; padding: 40px; border-radius: 20px;
            text-align: center; display: none; border: 2px solid #f1c40f; z-index: 100;
        }
    </style>
</head>
<body>

<div id="ui">
    <div class="stat">KILLS: <span id="score">0</span> / 20</div>
    <div class="stat">HP: <span id="health">100</span>%</div>
</div>
<div id="lvl-display">NÍVEL 1</div>

<div id="msg-overlay">
    <h1 id="msg-title">MISSÃO COMPLETA</h1>
    <p id="msg-body">Extração disponível no fim do mapa!</p>
</div>

<div id="controls-wrapper">
    <div id="joystick-container"><div id="joystick-knob"></div></div>
    <div class="control-group">
        <div id="btn-jump" class="action-btn">PULAR</div>
        <div id="btn-shoot" class="action-btn">FOGO</div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const healthEl = document.getElementById('health');
const lvlEl = document.getElementById('lvl-display');
const overlay = document.getElementById('msg-overlay');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const gravity = 0.6;
let score = 0;
let currentLevel = 1;
let gameActive = true;
let frameCount = 0;
const worldWidth = 5000;

const camera = { x: 0 };
const input = { joystickX: 0, jump: false, shoot: false };

const player = {
    x: 200, y: 100, w: 40, h: 60,
    vx: 0, vy: 0, speed: 7, jumpPower: -16,
    health: 100, grounded: false, facing: 1,
    color: '#3498db', animPhase: 0
};

const enemyColors = ['#c0392b', '#8e44ad', '#d35400', '#27ae60', '#2c3e50', '#f39c12'];

const maps = {
    1: { sky: '#2980b9', platforms: [
        {x: 0, y: canvas.height-80, w: 5000, h: 80},
        {x: 500, y: canvas.height-250, w: 400, h: 40},
        {x: 1200, y: canvas.height-400, w: 400, h: 40},
        {x: 2200, y: canvas.height-300, w: 800, h: 40}
    ]},
    2: { sky: '#2c3e50', platforms: [
        {x: 0, y: canvas.height-80, w: 1500, h: 80},
        {x: 1800, y: canvas.height-80, w: 3200, h: 80},
        {x: 600, y: canvas.height-250, w: 500, h: 40}
    ]},
    3: { sky: '#130f40', platforms: [
        {x: 0, y: canvas.height-80, w: 5000, h: 80},
        {x: 1000, y: canvas.height-300, w: 300, h: 30},
        {x: 1500, y: canvas.height-500, w: 400, h: 30}
    ]},
    4: { sky: '#b33939', platforms: [
        {x: 0, y: canvas.height-80, w: 5000, h: 80},
        {x: 1500, y: canvas.height-400, w: 2000, h: 40}
    ] }
};

let currentMap = maps[1];
const bullets = [];
const enemyBullets = [];
const enemies = [];
const airplane = { x: -600, y: 100, speed: 4, propAngle: 0 };
const exitDoor = { x: 4850, y: 0, w: 80, h: 120, active: false };

// --- Controles Multitoque ---
function handleTouch(e) {
    e.preventDefault();
    const touches = e.touches;
    input.jump = false;
    input.shoot = false;
    input.joystickX = 0;

    for (let i = 0; i < touches.length; i++) {
        const t = touches[i];
        const target = t.target;

        if (target.id === 'joystick-container' || target.id === 'joystick-knob') {
            const rect = document.getElementById('joystick-container').getBoundingClientRect();
            let dx = t.clientX - (rect.left + rect.width / 2);
            input.joystickX = Math.max(-1, Math.min(1, dx / 45));
            document.getElementById('joystick-knob').style.transform = `translateX(${input.joystickX * 45}px)`;
        }
        if (target.id === 'btn-jump') input.jump = true;
        if (target.id === 'btn-shoot') input.shoot = true;
    }
}

document.addEventListener('touchstart', handleTouch);
document.addEventListener('touchmove', handleTouch);
document.addEventListener('touchend', (e) => {
    if (e.touches.length === 0) {
        input.joystickX = 0;
        document.getElementById('joystick-knob').style.transform = `translate(0,0)`;
    }
    handleTouch(e);
});

// --- Desenho do Avião Militar com Hélice ---
function drawAdvancedAirplane(ctx, x, y) {
    airplane.propAngle += 0.8; // Velocidade da hélice
    
    ctx.save();
    // Asa Traseira (Estabilizador)
    ctx.fillStyle = '#4b6584';
    ctx.beginPath();
    ctx.moveTo(x + 20, y + 20);
    ctx.lineTo(x + 80, y - 30);
    ctx.lineTo(x + 120, y + 20);
    ctx.fill();

    // Corpo Principal (Fuselagem)
    ctx.fillStyle = '#778ca3';
    ctx.beginPath();
    ctx.roundRect(x + 50, y, 300, 70, 20);
    ctx.fill();

    // Nariz do Avião
    ctx.fillStyle = '#4b6584';
    ctx.beginPath();
    ctx.arc(x + 350, y + 35, 35, -Math.PI/2, Math.PI/2);
    ctx.fill();

    // Janelas da Cabine
    ctx.fillStyle = '#d1d8e0';
    ctx.fillRect(x + 330, y + 15, 30, 20);

    // Asa Principal
    ctx.fillStyle = '#4b6584';
    ctx.fillRect(x + 150, y + 30, 100, 15);

    // Motor e Hélice
    const motorX = x + 375;
    const motorY = y + 35;
    ctx.fillStyle = '#2f3542';
    ctx.fillRect(motorX, motorY - 10, 15, 20);

    // Hélice Animada
    ctx.translate(motorX + 15, motorY);
    ctx.rotate(airplane.propAngle);
    ctx.fillStyle = '#222';
    ctx.fillRect(-2, -40, 4, 80); // Lâmina 1
    ctx.rotate(Math.PI / 2);
    ctx.fillRect(-2, -40, 4, 80); // Lâmina 2
    
    ctx.restore();
}

function drawSoldier(ctx, x, y, color, facing, isMoving, phase, isEnemy=false, isFalling=false) {
    ctx.save();
    if (isFalling) {
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(x+20, y); ctx.lineTo(x-10, y-40); ctx.moveTo(x+20, y); ctx.lineTo(x+50, y-40); ctx.stroke();
        ctx.fillStyle = '#eb4d4b'; ctx.beginPath(); ctx.arc(x+20, y-45, 35, Math.PI, 0); ctx.fill();
    }
    ctx.translate(x + 20, y + 30);
    ctx.scale(facing, 1);
    const limb = isMoving ? Math.sin(phase) * 15 : 0;
    ctx.strokeStyle = '#111'; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(-limb, 28); ctx.stroke(); 
    ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(limb, 28); ctx.stroke();  
    ctx.fillStyle = color; ctx.fillRect(-12, -20, 24, 35);
    ctx.fillStyle = '#ffe0bd'; ctx.fillRect(-10, -35, 20, 20);
    ctx.fillStyle = isEnemy ? '#2c3e50' : '#1e3799'; ctx.fillRect(-13, -42, 26, 12); 
    ctx.fillStyle = '#222'; ctx.fillRect(10, 0, 30, 8);
    ctx.restore();
}

function update() {
    if (!gameActive) return;
    frameCount++;

    // Player
    player.vx = input.joystickX * player.speed;
    if (Math.abs(input.joystickX) > 0.1) {
        player.facing = input.joystickX > 0 ? 1 : -1;
        player.animPhase += 0.2;
    }
    if (input.jump && player.grounded) { player.vy = player.jumpPower; player.grounded = false; }
    if (input.shoot && frameCount % 12 === 0) {
        bullets.push({ x: player.x + (player.facing === 1 ? 40 : 0), y: player.y + 25, vx: 20 * player.facing });
    }

    player.vy += gravity;
    player.x += player.vx;
    player.y += player.vy;

    // Colisão laterais
    if (player.x < 0) player.x = 0;
    if (player.x > worldWidth - player.w) player.x = worldWidth - player.w;

    player.grounded = false;
    currentMap.platforms.forEach(p => {
        if (player.x + 10 < p.x + p.w && player.x + 30 > p.x) {
            if (player.vy >= 0 && player.y + player.h >= p.y && player.y + player.h <= p.y + p.h + player.vy) {
                player.y = p.y - player.h; player.vy = 0; player.grounded = true;
            }
        }
    });

    camera.x = player.x - canvas.width / 3;
    if (camera.x < 0) camera.x = 0;
    if (camera.x > worldWidth - canvas.width) camera.x = worldWidth - canvas.width;

    // Avião
    airplane.x += airplane.speed;
    if (airplane.x > worldWidth + 600) airplane.x = -600;
    if (score < 20 && frameCount % 150 === 0 && enemies.length < 8) {
        // Inimigos saem da traseira do avião
        enemies.push({ 
            x: airplane.x + 60, y: airplane.y + 40, vy: 1.5, state: 'falling', 
            facing: -1, animPhase: 0,
            color: enemyColors[Math.floor(Math.random() * enemyColors.length)],
            grounded: false, targetFacing: -1
        });
    }

    // Inimigos
    enemies.forEach((en, i) => {
        if (en.state !== 'falling') en.vy = (en.vy || 0) + gravity;
        en.y += en.vy;

        let enGrounded = false;
        currentMap.platforms.forEach(p => {
            if (en.x + 10 < p.x + p.w && en.x + 30 > p.x) {
                if (en.vy >= 0 && en.y + 60 >= p.y && en.y + 60 <= p.y + p.h + en.vy) {
                    en.y = p.y - 60; en.vy = 0; enGrounded = true;
                    if (en.state === 'falling') en.state = 'hunting';
                }
            }
        });
        en.grounded = enGrounded;

        if (en.state === 'hunting') {
            if (frameCount % 40 === 0) en.targetFacing = player.x > en.x ? 1 : -1;
            en.facing = en.targetFacing;
            en.x += en.facing * 2.5;
            en.animPhase += 0.15;

            if (player.y < en.y - 80 && en.grounded && Math.random() < 0.02) en.vy = -14;

            let dx = player.x - en.x;
            if (Math.abs(dx) < 35 && Math.abs(player.y - en.y) < 50) {
                player.x += (dx > 0 ? 6 : -6);
                player.health -= 0.15;
                healthEl.innerText = Math.max(0, Math.floor(player.health));
            }

            if (frameCount % 120 === 0 && Math.abs(dx) < 500) {
                enemyBullets.push({ x: en.x + 20, y: en.y + 25, vx: en.facing * 9 });
            }
        }
        if (en.y > canvas.height) enemies.splice(i, 1);
    });

    // Balas
    bullets.forEach((b, bi) => {
        b.x += b.vx;
        enemies.forEach((en, ei) => {
            if (b.x > en.x && b.x < en.x + 40 && b.y > en.y && b.y < en.y + 60) {
                enemies.splice(ei, 1); bullets.splice(bi, 1);
                score++; scoreEl.innerText = score;
                if(score >= 20) { exitDoor.active = true; exitDoor.y = currentMap.platforms[0].y - 120; showMsg("OBJETIVO CONCLUÍDO", "Extração no final!"); }
            }
        });
    });

    enemyBullets.forEach((eb, i) => {
        eb.x += eb.vx;
        if (eb.x > player.x && eb.x < player.x + 40 && eb.y > player.y && eb.y < player.y + 60) {
            player.health -= 5; enemyBullets.splice(i, 1);
            healthEl.innerText = Math.max(0, Math.floor(player.health));
            if (player.health <= 0) location.reload();
        }
    });

    if (exitDoor.active && player.x > exitDoor.x - 40) nextLevel();
    if (player.y > canvas.height + 100) location.reload();

    draw();
    requestAnimationFrame(update);
}

function nextLevel() {
    if (currentLevel < 4) {
        currentLevel++; score = 0; scoreEl.innerText = 0;
        player.x = 100; player.y = 0; exitDoor.active = false;
        enemies.length = 0; currentMap = maps[currentLevel];
        lvlEl.innerText = "NÍVEL " + currentLevel;
        showMsg("PRÓXIMA ÁREA", "Mantenha o foco!");
    } else {
        showMsg("VITÓRIA", "Guerra Finalizada!");
        gameActive = false;
    }
}

function showMsg(t, b) {
    overlay.style.display = 'block';
    document.getElementById('msg-title').innerText = t;
    document.getElementById('msg-body').innerText = b;
    setTimeout(() => { if(gameActive) overlay.style.display = 'none'; }, 3000);
}

function draw() {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.fillStyle = currentMap.sky;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.translate(-camera.x, 0);

    drawAdvancedAirplane(ctx, airplane.x, airplane.y);

    currentMap.platforms.forEach(p => {
        ctx.fillStyle = '#2d3436'; ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = '#636e72'; ctx.fillRect(p.x, p.y, p.w, 10);
    });

    if (exitDoor.active) { 
        ctx.fillStyle = '#2ecc71'; ctx.fillRect(exitDoor.x, exitDoor.y, exitDoor.w, exitDoor.h);
        ctx.fillStyle = '#27ae60'; ctx.fillRect(exitDoor.x + 10, exitDoor.y + 10, 10, 10);
    }

    drawSoldier(ctx, player.x, player.y, player.color, player.facing, Math.abs(player.vx) > 0.5, player.animPhase);
    enemies.forEach(en => drawSoldier(ctx, en.x, en.y, en.color, en.facing, en.state === 'hunting', en.animPhase, true, en.state === 'falling'));

    ctx.fillStyle = '#f1c40f'; bullets.forEach(b => ctx.fillRect(b.x, b.y, 18, 6));
    ctx.fillStyle = '#e74c3c'; enemyBullets.forEach(eb => ctx.fillRect(eb.x, eb.y, 14, 5));
}

update();
</script>
</body>
</html>
