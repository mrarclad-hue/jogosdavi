<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Airborne - Battle Mode</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1e272e; font-family: sans-serif; touch-action: none; }
        canvas { display: block; background: #2980b9; }
        
        #menu-container {
            position: absolute; width: 100%; height: 100%; background: #1e272e;
            z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn {
            width: 280px; padding: 20px; margin: 10px; border: none; border-radius: 10px;
            font-size: 20px; font-weight: bold; cursor: pointer; color: #fff;
        }
        #p1-btn { background: #3498db; }
        #p2-btn { background: #e67e22; }
        #status-display { color: #fff; margin-top: 20px; font-family: monospace; text-align: center; }

        #controls { position: absolute; bottom: 30px; width: 100%; display: none; justify-content: space-between; padding: 0 30px; box-sizing: border-box; }
        .control-btn { width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.3); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; pointer-events: auto; user-select: none; }
        #joystick { width: 120px; height: 120px; border: 3px solid #fff; border-radius: 50%; position: relative; }
        #knob { width: 50px; height: 50px; background: #fff; border-radius: 50%; position: absolute; top: 35px; left: 35px; }
    </style>
</head>
<body>

<div id="menu-container">
    <h1 style="color: white;">ELITE AIRBORNE: BATTLE</h1>
    <button id="p1-btn" class="btn">JOGADOR 1 (AZUL)</button>
    <button id="p2-btn" class="btn">JOGADOR 2 (LARANJA)</button>
    <div id="status-display">Conecte os dispositivos para lutar!</div>
</div>

<div id="controls">
    <div id="joystick"><div id="knob"></div></div>
    <div style="display: flex; gap: 20px;">
        <div id="btn-jump" class="control-btn" style="background: #27ae60;">PULAR</div>
        <div id="btn-shoot" class="control-btn" style="background: #e74c3c;">FOGO</div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const ID_P1 = "JOGADOR2DUO2026";
const ID_P2 = "AQUISERABOM2026";
let peer, conn, isHost = false, gameActive = false;

// Configurações Fixas para Sincronia
const GROUND_Y = 550;
const gravity = 0.8;

const player = { x: 200, y: 0, w: 40, h: 60, vx: 0, vy: 0, facing: 1, anim: 0, color: '#3498db', hp: 100, grounded: false };
const remotePlayer = { x: 600, y: 0, w: 40, h: 60, facing: 1, anim: 0, color: '#e67e22', hp: 100, active: false };

const bullets = [];
const input = { x: 0, jump: false, shoot: false };
const camera = { x: 0 };

// Plataformas em 3 Níveis
const platforms = [
    {x: -1000, y: GROUND_Y, w: 7000, h: 200}, // Nível 0 (Chão)
    {x: 200, y: GROUND_Y - 120, w: 400, h: 20}, // Nível 1
    {x: 800, y: GROUND_Y - 120, w: 400, h: 20}, // Nível 1
    {x: 500, y: GROUND_Y - 240, w: 400, h: 20}, // Nível 2
    {x: 300, y: GROUND_Y - 360, w: 200, h: 20}, // Nível 3
    {x: 900, y: GROUND_Y - 360, w: 200, h: 20}  // Nível 3
];

// --- CONEXÃO ---
document.getElementById('p1-btn').onclick = () => { player.color = '#3498db'; remotePlayer.color = '#e67e22'; startPeer(ID_P1, true); };
document.getElementById('p2-btn').onclick = () => { player.color = '#e67e22'; remotePlayer.color = '#3498db'; startPeer(ID_P2, false); };

function startPeer(id, host) {
    isHost = host;
    peer = new Peer(id);
    document.getElementById('status-display').innerText = "Iniciando rádio...";

    peer.on('open', () => {
        document.getElementById('status-display').innerText = "Online! Aguardando oponente...";
        if (!isHost) tryConnect();
    });

    peer.on('connection', (c) => {
        conn = c;
        setupNetwork();
    });
}

function tryConnect() {
    const c = peer.connect(ID_P1);
    c.on('open', () => { conn = c; setupNetwork(); });
}

function setupNetwork() {
    conn.on('data', (data) => {
        if (data.type === 'sync') {
            remotePlayer.x = data.x; remotePlayer.y = data.y;
            remotePlayer.facing = data.facing; remotePlayer.anim = data.anim;
            remotePlayer.hp = data.hp; remotePlayer.active = true;
        }
        if (data.type === 'shoot') {
            bullets.push({ x: data.x, y: data.y, vx: data.vx, owner: 'remote' });
        }
    });
    document.getElementById('menu-container').style.display = 'none';
    document.getElementById('controls').style.display = 'flex';
    gameActive = true;
    gameLoop();
}

// --- CONTROLES ---
function handleTouch(e) {
    const touches = e.touches;
    input.jump = false; input.shoot = false;
    for(let i=0; i<touches.length; i++){
        const t = touches[i];
        const el = document.elementFromPoint(t.clientX, t.clientY);
        if (el && (el.id === 'joystick' || el.id === 'knob')) {
            const rect = document.getElementById('joystick').getBoundingClientRect();
            input.x = t.clientX > (rect.left + rect.width/2) ? 1 : -1;
            document.getElementById('knob').style.transform = `translateX(${input.x * 30}px)`;
        }
        if (el && el.id === 'btn-jump') input.jump = true;
        if (el && el.id === 'btn-shoot') input.shoot = true;
    }
}
document.addEventListener('touchstart', handleTouch);
document.addEventListener('touchmove', handleTouch);
document.addEventListener('touchend', () => { input.x = 0; document.getElementById('knob').style.transform = `translateX(0)`; });

// --- LÓGICA DO JOGO ---
function gameLoop() {
    if (!gameActive) return;

    // Movimento e Gravidade
    player.vx = input.x * 7;
    if (input.jump && player.grounded) { player.vy = -16; player.grounded = false; }
    player.vy += gravity;
    player.x += player.vx;
    player.y += player.vy;

    // Colisão com Plataformas
    player.grounded = false;
    platforms.forEach(p => {
        if (player.x + 15 < p.x + p.w && player.x + 25 > p.x) {
            if (player.vy >= 0 && player.y + player.h >= p.y && player.y + player.h <= p.y + 20) {
                player.y = p.y - player.h;
                player.vy = 0;
                player.grounded = true;
            }
        }
    });

    // Atirar e Dano
    if (input.shoot && Date.now() % 250 < 20) {
        const bx = player.x + (player.facing * 40);
        const bvx = player.facing * 16;
        bullets.push({ x: bx, y: player.y + 25, vx: bvx, owner: 'me' });
        conn.send({ type: 'shoot', x: bx, y: player.y + 25, vx: bvx });
    }

    bullets.forEach((b, i) => {
        b.x += b.vx;
        // Checar se meu tiro acertou o inimigo
        if (b.owner === 'me' && remotePlayer.active) {
            if (b.x > remotePlayer.x && b.x < remotePlayer.x + 40 && b.y > remotePlayer.y && b.y < remotePlayer.y + 60) {
                bullets.splice(i, 1);
                // O dano é visualizado quando o oponente envia a vida dele atualizada
            }
        }
        // Checar se o tiro do inimigo me acertou
        if (b.owner === 'remote') {
            if (b.x > player.x && b.x < player.x + 40 && b.y > player.y && b.y < player.y + 60) {
                bullets.splice(i, 1);
                player.hp -= 5;
                if (player.hp < 0) { player.hp = 100; player.x = isHost ? 200 : 600; player.y = 0; }
            }
        }
    });

    if (Math.abs(player.vx) > 0.1) { player.facing = player.vx > 0 ? 1 : -1; player.anim += 0.2; }

    // Sincronizar
    conn.send({ type: 'sync', x: player.x, y: player.y, facing: player.facing, anim: player.anim, hp: player.hp });

    camera.x = player.x - canvas.width / 2;
    draw();
    requestAnimationFrame(gameLoop);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-camera.x, 0);

    // Desenhar Plataformas
    platforms.forEach(p => {
        ctx.fillStyle = '#2d3436';
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = '#27ae60';
        ctx.fillRect(p.x, p.y, p.w, 6);
    });

    // Jogadores e Barras de Vida
    drawSoldier(player.x, player.y, player.color, player.facing, player.anim, player.hp);
    if (remotePlayer.active) {
        drawSoldier(remotePlayer.x, remotePlayer.y, remotePlayer.color, remotePlayer.facing, remotePlayer.anim, remotePlayer.hp);
    }

    // Balas
    ctx.fillStyle = '#f1c40f';
    bullets.forEach(b => ctx.fillRect(b.x, b.y, 15, 5));

    ctx.restore();
}

function drawSoldier(x, y, color, facing, anim, hp) {
    ctx.save();
    // Barra de Vida
    const barW = 50;
    ctx.fillStyle = 'red';
    ctx.fillRect(x - 5, y - 15, barW, 6);
    ctx.fillStyle = '#2ecc71';
    ctx.fillRect(x - 5, y - 15, barW * (hp / 100), 6);

    ctx.translate(x + 20, y + 30);
    ctx.scale(facing, 1);
    const legMove = Math.sin(anim) * 10;
    ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(-legMove, 30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(legMove, 30); ctx.stroke();
    ctx.fillStyle = color; ctx.fillRect(-15, -20, 30, 40);
    ctx.fillStyle = '#ffe0bd'; ctx.fillRect(-10, -35, 20, 20);
    ctx.restore();
}
</script>
</body>
</html>
