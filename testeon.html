<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Airborne Online - Sincronizado</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1e272e; font-family: sans-serif; touch-action: none; }
        canvas { display: block; background: #2980b9; }
        
        #menu-container {
            position: absolute; width: 100%; height: 100%; background: #1e272e;
            z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn {
            width: 280px; padding: 20px; margin: 10px; border: none; border-radius: 10px;
            font-size: 20px; font-weight: bold; cursor: pointer; color: #fff;
        }
        #p1-btn { background: #3498db; }
        #p2-btn { background: #e67e22; }
        #status-display { color: #fff; margin-top: 20px; font-family: monospace; text-align: center; }

        #controls { position: absolute; bottom: 30px; width: 100%; display: none; justify-content: space-between; padding: 0 30px; box-sizing: border-box; }
        .control-btn { width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.3); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; pointer-events: auto; }
        #joystick { width: 120px; height: 120px; border: 3px solid #fff; border-radius: 50%; position: relative; }
        #knob { width: 50px; height: 50px; background: #fff; border-radius: 50%; position: absolute; top: 35px; left: 35px; }
    </style>
</head>
<body>

<div id="menu-container">
    <h1 style="color: white;">ELITE AIRBORNE ONLINE</h1>
    <button id="p1-btn" class="btn">JOGADOR 1 (CELULAR)</button>
    <button id="p2-btn" class="btn">JOGADOR 2 (TABLET)</button>
    <div id="status-display">Aguardando conexão...</div>
</div>

<div id="controls">
    <div id="joystick"><div id="knob"></div></div>
    <div style="display: flex; gap: 20px;">
        <div id="btn-jump" class="control-btn" style="background: #27ae60;">PULAR</div>
        <div id="btn-shoot" class="control-btn" style="background: #e74c3c;">FOGO</div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>
const statusText = document.getElementById('status-display');
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Ajuste de tela
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const ID_P1 = "JOGADOR2DUO2026";
const ID_P2 = "AQUISERABOM2026";
let peer, conn, isHost = false, gameActive = false;

// Coordenadas ABSOLUTAS (Igual para Celular e Tablet)
const GROUND_Y = 500; 

const player = { x: 300, y: 0, w: 40, h: 60, vx: 0, vy: 0, facing: 1, anim: 0, color: '#3498db', grounded: false };
const remotePlayer = { x: 300, y: 0, facing: 1, anim: 0, color: '#e67e22', active: false };
const input = { x: 0, jump: false, shoot: false };
const bullets = [];
const camera = { x: 0 };

// --- REDE ---
document.getElementById('p1-btn').onclick = () => { player.color = '#3498db'; remotePlayer.color = '#e67e22'; startPeer(ID_P1, true); };
document.getElementById('p2-btn').onclick = () => { player.color = '#e67e22'; remotePlayer.color = '#3498db'; startPeer(ID_P2, false); };

function startPeer(id, host) {
    isHost = host;
    peer = new Peer(id);
    statusText.innerText = "Conectando...";

    peer.on('open', (id) => {
        statusText.innerText = "Online! ID: " + id;
        if (!isHost) tryConnect();
    });

    peer.on('connection', (c) => {
        conn = c;
        setupNetwork();
    });
}

function tryConnect() {
    const c = peer.connect(ID_P1);
    c.on('open', () => { conn = c; setupNetwork(); });
}

function setupNetwork() {
    conn.on('data', (data) => {
        if (data.type === 'sync') {
            remotePlayer.x = data.x;
            remotePlayer.y = data.y;
            remotePlayer.facing = data.facing;
            remotePlayer.anim = data.anim;
            remotePlayer.active = true;
        }
        if (data.type === 'shoot') {
            bullets.push({ x: data.x, y: data.y, vx: data.vx });
        }
    });
    
    document.getElementById('menu-container').style.display = 'none';
    document.getElementById('controls').style.display = 'flex';
    gameActive = true;
    gameLoop();
}

// --- CONTROLES ---
function handleTouch(e) {
    const touches = e.touches;
    input.jump = false; input.shoot = false;
    for(let i=0; i<touches.length; i++){
        const t = touches[i];
        const el = document.elementFromPoint(t.clientX, t.clientY);
        if (el && (el.id === 'joystick' || el.id === 'knob')) {
            const rect = document.getElementById('joystick').getBoundingClientRect();
            input.x = t.clientX > (rect.left + rect.width/2) ? 1 : -1;
            document.getElementById('knob').style.transform = `translateX(${input.x * 30}px)`;
        }
        if (el && el.id === 'btn-jump') input.jump = true;
        if (el && el.id === 'btn-shoot') input.shoot = true;
    }
}
document.addEventListener('touchstart', handleTouch);
document.addEventListener('touchmove', handleTouch);
document.addEventListener('touchend', () => { input.x = 0; document.getElementById('knob').style.transform = `translateX(0)`; });

// --- JOGO ---
function gameLoop() {
    if (!gameActive) return;

    // Física
    player.vx = input.x * 7;
    if (input.jump && player.grounded) { player.vy = -16; player.grounded = false; }
    
    player.vy += 0.8;
    player.x += player.vx;
    player.y += player.vy;

    // CHÃO ABSOLUTO (Sincroniza Celular e Tablet)
    if (player.y > GROUND_Y - player.h) {
        player.y = GROUND_Y - player.h;
        player.vy = 0;
        player.grounded = true;
    }

    if (Math.abs(player.vx) > 0.1) {
        player.facing = player.vx > 0 ? 1 : -1;
        player.anim += 0.2;
    }

    // Tiro
    if (input.shoot && Date.now() % 200 < 20) {
        const bx = player.x + (player.facing * 40);
        const bvx = player.facing * 15;
        bullets.push({ x: bx, y: player.y + 25, vx: bvx });
        conn.send({ type: 'shoot', x: bx, y: player.y + 25, vx: bvx });
    }

    // Sincronização de posição
    conn.send({ type: 'sync', x: player.x, y: player.y, facing: player.facing, anim: player.anim });

    bullets.forEach(b => b.x += b.vx);
    camera.x = player.x - canvas.width / 2;

    draw();
    requestAnimationFrame(gameLoop);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-camera.x, 0);

    // Chão desenhado na posição ABSOLUTA
    ctx.fillStyle = '#2d3436';
    ctx.fillRect(-1000, GROUND_Y, 7000, 1000); 
    ctx.fillStyle = '#27ae60';
    ctx.fillRect(-1000, GROUND_Y, 7000, 10); // Grama

    // Jogadores
    drawSoldier(player.x, player.y, player.color, player.facing, player.anim);
    if (remotePlayer.active) drawSoldier(remotePlayer.x, remotePlayer.y, remotePlayer.color, remotePlayer.facing, remotePlayer.anim);

    // Balas
    ctx.fillStyle = '#f1c40f';
    bullets.forEach(b => ctx.fillRect(b.x, b.y, 20, 6));

    ctx.restore();
}

function drawSoldier(x, y, color, facing, anim) {
    ctx.save();
    ctx.translate(x + 20, y + 30);
    ctx.scale(facing, 1);
    const legMove = Math.sin(anim) * 10;
    ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(-legMove, 30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(legMove, 30); ctx.stroke();
    ctx.fillStyle = color; ctx.fillRect(-15, -20, 30, 40);
    ctx.fillStyle = '#ffe0bd'; ctx.fillRect(-10, -35, 20, 20);
    ctx.restore();
}
</script>
</body>
</html>
