<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Airborne - Pro Multiplayer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1e272e; font-family: sans-serif; touch-action: none; }
        canvas { display: block; background: #2980b9; }
        
        #menu-container {
            position: absolute; width: 100%; height: 100%; background: #1e272e;
            z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn {
            width: 280px; padding: 20px; margin: 10px; border: none; border-radius: 10px;
            font-size: 20px; font-weight: bold; cursor: pointer; color: #fff;
        }
        #p1-btn { background: #3498db; }
        #p2-btn { background: #e67e22; }
        #status-display { color: #fff; margin-top: 20px; font-family: monospace; text-align: center; }

        /* Controles flutuantes para não interferir um no outro */
        #controls { position: absolute; bottom: 30px; width: 100%; display: none; justify-content: space-between; padding: 0 30px; box-sizing: border-box; pointer-events: none; }
        .control-area { pointer-events: auto; }
        .btn-circle { width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.3); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; user-select: none; }
        #joystick { width: 140px; height: 140px; border: 3px solid #fff; border-radius: 50%; position: relative; }
        #knob { width: 60px; height: 60px; background: #fff; border-radius: 50%; position: absolute; top: 40px; left: 40px; }
    </style>
</head>
<body>

<div id="menu-container">
    <h1 style="color: white;">ELITE AIRBORNE: PRO</h1>
    <button id="p1-btn" class="btn">JOGADOR 1</button>
    <button id="p2-btn" class="btn">JOGADOR 2</button>
    <div id="status-display">Suporte a Multi-Touch Ativado</div>
</div>

<div id="controls">
    <div id="joystick" class="control-area"><div id="knob"></div></div>
    <div style="display: flex; gap: 20px;" class="control-area">
        <div id="btn-jump" class="btn-circle" style="background: #27ae60;">PULO</div>
        <div id="btn-shoot" class="btn-circle" style="background: #e74c3c;">TIRO</div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const ID_P1 = "JOGADOR2DUO2026";
const ID_P2 = "AQUISERABOM2026";
let peer, conn, isHost = false, gameActive = false;

const GROUND_Y = 550;
const gravity = 0.8;

// Player Local
const player = { x: 200, y: 0, w: 40, h: 60, vx: 0, vy: 0, facing: 1, anim: 0, color: '#3498db', hp: 100, grounded: false };
// Player Remoto com variáveis de suavização (Lerp)
const remotePlayer = { x: 600, y: 0, targetX: 600, targetY: 0, facing: 1, anim: 0, color: '#e67e22', hp: 100, active: false };

const bullets = [];
const camera = { x: 0 };

// Estrutura para Multi-Touch
const activeInputs = { left: false, right: false, jump: false, shoot: false };

const platforms = [
    {x: -1000, y: GROUND_Y, w: 7000, h: 200},
    {x: 200, y: GROUND_Y - 140, w: 400, h: 20},
    {x: 800, y: GROUND_Y - 140, w: 400, h: 20},
    {x: 500, y: GROUND_Y - 280, w: 400, h: 20}
];

// --- CONEXÃO ---
document.getElementById('p1-btn').onclick = () => { player.color = '#3498db'; remotePlayer.color = '#e67e22'; startPeer(ID_P1, true); };
document.getElementById('p2-btn').onclick = () => { player.color = '#e67e22'; remotePlayer.color = '#3498db'; startPeer(ID_P2, false); };

function startPeer(id, host) {
    isHost = host;
    peer = new Peer(id);
    peer.on('open', () => {
        document.getElementById('status-display').innerText = "Online! Aguardando amigo...";
        if (!isHost) tryConnect();
    });
    peer.on('connection', (c) => { conn = c; setupNetwork(); });
}

function tryConnect() {
    const c = peer.connect(ID_P1);
    c.on('open', () => { conn = c; setupNetwork(); });
}

function setupNetwork() {
    conn.on('data', (data) => {
        if (data.type === 'sync') {
            remotePlayer.targetX = data.x;
            remotePlayer.targetY = data.y;
            remotePlayer.facing = data.facing;
            remotePlayer.anim = data.anim;
            remotePlayer.hp = data.hp;
            remotePlayer.active = true;
        }
        if (data.type === 'shoot') {
            bullets.push({ x: data.x, y: data.y, vx: data.vx, owner: 'remote' });
        }
    });
    document.getElementById('menu-container').style.display = 'none';
    document.getElementById('controls').style.display = 'flex';
    gameActive = true;
    gameLoop();
}

// --- CONTROLES MULTI-TOUCH MELHORADOS ---
function updateInputs(e) {
    e.preventDefault();
    // Reset inputs
    activeInputs.left = false;
    activeInputs.right = false;
    activeInputs.jump = false;
    activeInputs.shoot = false;

    const knob = document.getElementById('knob');
    const joystickRect = document.getElementById('joystick').getBoundingClientRect();
    const jCenterX = joystickRect.left + joystickRect.width / 2;

    for (let i = 0; i < e.touches.length; i++) {
        const touch = e.touches[i];
        const el = document.elementFromPoint(touch.clientX, touch.clientY);

        // Lógica do Joystick
        if (touch.clientX < window.innerWidth / 2) {
            if (touch.clientX < jCenterX - 10) activeInputs.left = true;
            if (touch.clientX > jCenterX + 10) activeInputs.right = true;
            
            let offsetX = Math.min(Math.max(touch.clientX - jCenterX, -40), 40);
            knob.style.transform = `translateX(${offsetX}px)`;
        }

        // Lógica dos Botões
        if (el) {
            if (el.id === 'btn-jump') activeInputs.jump = true;
            if (el.id === 'btn-shoot') activeInputs.shoot = true;
        }
    }

    if (e.touches.length === 0 || !Array.from(e.touches).some(t => t.clientX < window.innerWidth / 2)) {
        knob.style.transform = `translateX(0)`;
    }
}

document.addEventListener('touchstart', updateInputs);
document.addEventListener('touchmove', updateInputs);
document.addEventListener('touchend', updateInputs);

// --- LOOP DO JOGO ---
let lastShootTime = 0;

function gameLoop() {
    if (!gameActive) return;

    // Física Local
    player.vx = 0;
    if (activeInputs.left) player.vx = -7;
    if (activeInputs.right) player.vx = 7;
    
    if (activeInputs.jump && player.grounded) {
        player.vy = -16;
        player.grounded = false;
    }

    player.vy += gravity;
    player.x += player.vx;
    player.y += player.vy;

    // Colisão
    player.grounded = false;
    platforms.forEach(p => {
        if (player.x + 10 < p.x + p.w && player.x + 30 > p.x) {
            if (player.vy >= 0 && player.y + player.h >= p.y && player.y + player.h <= p.y + 25) {
                player.y = p.y - player.h;
                player.vy = 0;
                player.grounded = true;
            }
        }
    });

    // Tiro (Permite atirar enquanto corre)
    if (activeInputs.shoot && Date.now() - lastShootTime > 200) {
        const bx = player.x + (player.facing * 40);
        bullets.push({ x: bx, y: player.y + 25, vx: player.facing * 16, owner: 'me' });
        conn.send({ type: 'shoot', x: bx, y: player.y + 25, vx: player.facing * 16 });
        lastShootTime = Date.now();
    }

    // SUAVIZAÇÃO DO REMOTO (Lerp) - Remove o Teleporte
    remotePlayer.x += (remotePlayer.targetX - remotePlayer.x) * 0.2;
    remotePlayer.y += (remotePlayer.targetY - remotePlayer.y) * 0.2;

    if (Math.abs(player.vx) > 0.1) {
        player.facing = player.vx > 0 ? 1 : -1;
        player.anim += 0.2;
    }

    // Processar Balas e Dano
    bullets.forEach((b, i) => {
        b.x += b.vx;
        if (b.owner === 'remote' && b.x > player.x && b.x < player.x + 40 && b.y > player.y && b.y < player.y + 60) {
            bullets.splice(i, 1);
            player.hp -= 5;
            if(player.hp <= 0) { player.hp = 100; player.x = 300; player.y = 0; }
        }
    });

    // Enviar dados com frequência alta
    conn.send({ type: 'sync', x: player.x, y: player.y, facing: player.facing, anim: player.anim, hp: player.hp });

    camera.x = player.x - canvas.width / 2;
    draw();
    requestAnimationFrame(gameLoop);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-camera.x, 0);

    // Plataformas
    platforms.forEach(p => {
        ctx.fillStyle = '#2d3436';
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = '#27ae60';
        ctx.fillRect(p.x, p.y, p.w, 6);
    });

    // Jogadores
    drawSoldier(player.x, player.y, player.color, player.facing, player.anim, player.hp);
    if (remotePlayer.active) {
        drawSoldier(remotePlayer.x, remotePlayer.y, remotePlayer.color, remotePlayer.facing, remotePlayer.anim, remotePlayer.hp);
    }

    // Balas
    ctx.fillStyle = '#f1c40f';
    bullets.forEach(b => ctx.fillRect(b.x, b.y, 15, 5));

    ctx.restore();
}

function drawSoldier(x, y, color, facing, anim, hp) {
    ctx.save();
    // Barra de Vida
    ctx.fillStyle = 'red'; ctx.fillRect(x - 5, y - 15, 50, 6);
    ctx.fillStyle = '#2ecc71'; ctx.fillRect(x - 5, y - 15, 50 * (hp / 100), 6);

    ctx.translate(x + 20, y + 30);
    ctx.scale(facing, 1);
    const legMove = Math.sin(anim) * 10;
    ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(-legMove, 30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(legMove, 30); ctx.stroke();
    ctx.fillStyle = color; ctx.fillRect(-15, -20, 30, 40);
    ctx.fillStyle = '#ffe0bd'; ctx.fillRect(-10, -35, 20, 20);
    ctx.restore();
}
</script>
</body>
</html>
