<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Airborne - Final Battle</title>
    <style>
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; background: #1e272e; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { display: block; background: #000; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .interactive { pointer-events: auto; }

        #rotate-ui-btn {
            position: absolute; top: 15px; right: 15px; width: 55px; height: 55px;
            background: #8e44ad; border: 3px solid #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; z-index: 1100;
            color: white; font-size: 24px; pointer-events: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        #menu-container, #end-screen {
            position: absolute; width: 100%; height: 100%; background: rgba(30, 39, 46, 0.95);
            z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;
        }

        .panel { background: #2f3640; padding: 15px; border-radius: 15px; border: 2px solid #3498db; text-align: center; margin-bottom: 10px; width: 85%; max-width: 350px; }
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; color: #fff; cursor: pointer; }
        .btn-p1 { background: #3498db; width: 45%; }
        .btn-p2 { background: #e67e22; width: 45%; }
        .btn-map { background: #7f8c8d; flex: 1; margin: 2px; font-size: 10px; }
        .btn-map.selected { background: #27ae60; border: 2px solid #fff; }

        #controls { position: absolute; bottom: 20px; width: 100%; display: none; justify-content: space-between; padding: 0 30px; box-sizing: border-box; align-items: flex-end; }
        .control-btn { width: 70px; height: 70px; border-radius: 50%; background: rgba(255,255,255,0.2); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid rgba(255,255,255,0.4); margin: 5px; font-size: 12px; }
        
        #joystick { width: 120px; height: 120px; border: 4px solid rgba(255,255,255,0.3); border-radius: 50%; position: relative; background: rgba(255,255,255,0.1); }
        #knob { width: 50px; height: 50px; background: #fff; border-radius: 50%; position: absolute; top: 35px; left: 35px; }

        #stats { position: absolute; top: 15px; left: 15px; color: white; background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 20px; font-size: 14px; border: 1px solid #3498db; }
        .win-text { font-size: 48px; color: #2ecc71; text-shadow: 0 0 20px #2ecc71; }
        .lose-text { font-size: 48px; color: #e74c3c; text-shadow: 0 0 20px #e74c3c; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="rotate-ui-btn" class="interactive">🔄</div>

<div id="menu-container">
    <h1>ELITE AIRBORNE</h1>
    <div class="panel">
        <h4>MAPA</h4>
        <div style="display: flex;">
            <div id="map-0" class="btn btn-map selected">URBANO</div>
            <div id="map-1" class="btn btn-map">DESERTO</div>
            <div id="map-2" class="btn btn-map">FLORESTA</div>
        </div>
    </div>
    <div class="panel">
        <div style="display: flex; justify-content: space-between;">
            <div id="p1-btn" class="btn btn-p1">CRIAR SALA</div>
            <div id="p2-btn" class="btn btn-p2">ENTRAR</div>
        </div>
    </div>
    <div id="status-display">Conecte-se para lutar!</div>
</div>

<div id="end-screen" style="display:none;">
    <h1 id="end-title"></h1>
    <p id="end-subtitle"></p>
    <button class="btn btn-p1" onclick="location.reload()">JOGAR NOVAMENTE</button>
</div>

<div id="ui-layer">
    <div id="stats">
        KILLS: <span id="kill-count">0</span>/4 | 
        GRANADAS: <span id="grenade-count">0</span>
    </div>
    <div id="controls" class="interactive">
        <div id="joystick"><div id="knob"></div></div>
        <div style="display: flex; flex-direction: column; align-items: center;">
            <div id="btn-grenade" class="control-btn" style="background: rgba(241, 196, 15, 0.4);">GRANADA</div>
            <div style="display: flex;">
                <div id="btn-jump" class="control-btn" style="background: rgba(46, 204, 113, 0.4);">PULAR</div>
                <div id="btn-shoot" class="control-btn" style="background: rgba(231, 76, 60, 0.4);">FOGO</div>
            </div>
        </div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
// --- ÁUDIO ENGINE (Sintetizado para não precisar de arquivos externos) ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    if(type === 'shoot') {
        osc.type = 'square'; osc.frequency.setValueAtTime(150, now);
        osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.1);
        gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.1);
    } else if(type === 'exp') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now);
        osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.5);
        gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0, now + 0.5);
    } else if(type === 'jump') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(400, now);
        osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
        gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.1);
    } else if(type === 'pickup') {
        osc.type = 'triangle'; osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
        gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.1);
    }
    osc.start(); osc.stop(now + 0.5);
}

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const V_WIDTH = 1280; const V_HEIGHT = 720;
function resize() {
    const scale = Math.min(window.innerWidth / V_WIDTH, window.innerHeight / V_HEIGHT);
    canvas.width = V_WIDTH * scale; canvas.height = V_HEIGHT * scale;
    ctx.setTransform(scale, 0, 0, scale, 0, 0);
}
window.addEventListener('resize', resize); resize();

// Rotação e Cor do Botão
document.getElementById('rotate-ui-btn').addEventListener('touchstart', async (e) => {
    e.preventDefault();
    const btn = e.currentTarget;
    if (screen.orientation && screen.orientation.lock) {
        if (screen.orientation.type.includes('portrait')) {
            await document.documentElement.requestFullscreen().catch(()=>{});
            await screen.orientation.lock('landscape').catch(()=>{});
            btn.style.background = "#27ae60"; // Verde no paisagem
        } else {
            if (document.fullscreenElement) await document.exitFullscreen().catch(()=>{});
            await screen.orientation.lock('portrait').catch(()=>{});
            btn.style.background = "#8e44ad"; // Roxo no retrato
        }
    }
});

const ID_P1 = "JOGADOR2DUO2026"; const ID_P2 = "AQUISERABOM2026";
let peer, conn, isHost = false, gameActive = false, kills = 0, remoteKills = 0;

const player = { x: 200, y: 0, vx: 0, vy: 0, w: 45, h: 65, facing: 1, anim: 0, color: '#3498db', hp: 100, grounded: false, grenades: 0 };
const remotePlayer = { x: 600, y: 0, targetX: 600, targetY: 0, w: 45, h: 65, facing: 1, anim: 0, color: '#e67e22', hp: 100, active: false };
let bullets = [], grenades = [], items = [], plane = { x: -500, active: false }, bombs = [];

const maps = [
    { bg: '#2c3e50', plat: '#7f8c8d', rects: [{x: 0, y: 620, w: 4000, h: 100}, {x: 400, y: 450, w: 400, h: 30}, {x: 1000, y: 350, w: 400, h: 30}] },
    { bg: '#d35400', plat: '#e67e22', rects: [{x: 0, y: 620, w: 4000, h: 100}, {x: 200, y: 480, w: 300, h: 30}, {x: 700, y: 380, w: 300, h: 30}] },
    { bg: '#1b1464', plat: '#0652DD', rects: [{x: 0, y: 620, w: 4000, h: 100}, {x: 300, y: 420, w: 500, h: 30}, {x: 900, y: 300, w: 300, h: 30}] }
];

const input = { x: 0, jump: false, shoot: false, grenade: false };

function handleTouch(e) {
    e.preventDefault(); const touches = e.touches;
    let moveX = 0; let joy = false;
    input.jump = false; input.shoot = false; input.grenade = false;
    for (let t of touches) {
        const el = document.elementFromPoint(t.clientX, t.clientY);
        if(!el) continue;
        if(!gameActive){
            if(el.id==='p1-btn') startPeer(ID_P1, true);
            if(el.id==='p2-btn') startPeer(ID_P2, false);
            if(el.id.includes('map-')) {
                selectedMapIndex = parseInt(el.id.split('-')[1]);
                document.querySelectorAll('.btn-map').forEach((b, i) => b.classList.toggle('selected', i === selectedMapIndex));
            }
        }
        if(el.id==='joystick' || el.id==='knob'){
            const r = document.getElementById('joystick').getBoundingClientRect();
            moveX = t.clientX < (r.left + r.width/2) ? -1 : 1;
            document.getElementById('knob').style.transform = `translateX(${Math.max(-35, Math.min(35, t.clientX-(r.left+r.width/2)))}px)`;
            joy = true;
        }
        if(el.id==='btn-jump') input.jump = true;
        if(el.id==='btn-shoot') input.shoot = true;
        if(el.id==='btn-grenade') input.grenade = true;
    }
    input.x = moveX; if(!joy) document.getElementById('knob').style.transform = `translateX(0)`;
}

document.addEventListener('touchstart', handleTouch, {passive:false});
document.addEventListener('touchmove', handleTouch, {passive:false});
document.addEventListener('touchend', (e) => { if(e.touches.length===0) input.x=0; handleTouch(e); }, {passive:false});

function startPeer(id, host) {
    isHost = host; peer = new Peer(id);
    document.getElementById('status-display').innerText = "Conectando...";
    peer.on('open', () => {
        if(!host){ conn = peer.connect(ID_P1); conn.on('open', setupNetwork); }
    });
    peer.on('connection', (c) => { conn = c; conn.on('open', () => { conn.send({type:'map', i:selectedMapIndex}); setupNetwork(); })});
}

function setupNetwork() {
    conn.on('data', d => {
        if(d.type==='sync'){ remotePlayer.targetX=d.x; remotePlayer.targetY=d.y; remotePlayer.facing=d.f; remotePlayer.anim=d.a; remotePlayer.hp=d.h; remotePlayer.active=true; }
        if(d.type==='shot'){ bullets.push({x:d.x, y:d.y, vx:d.v, owner:'remote'}); playSound('shoot'); }
        if(d.type==='map') selectedMapIndex = d.i;
        if(d.type==='grenade') grenades.push({x:d.x, y:d.y, vx:d.v, vy:-10, timer:60, owner:'remote'});
        if(d.type==='kill'){ remoteKills++; checkEndGame(); }
        if(d.type==='plane'){ plane.active = true; plane.x = -500; }
    });
    document.getElementById('menu-container').style.display = 'none';
    document.getElementById('controls').style.display = 'flex';
    gameActive = true; spawnItem(); gameLoop();
}

function spawnItem() {
    if(isHost) {
        const x = 500 + Math.random() * 2000;
        items.push({x, y: 580, type:'grenade'});
    }
    setTimeout(spawnItem, 10000);
}

function checkEndGame() {
    if(kills >= 4 || remoteKills >= 4) {
        gameActive = false;
        document.getElementById('end-screen').style.display = 'flex';
        const win = kills >= 4;
        document.getElementById('end-title').innerText = win ? "VITÓRIA!" : "DERROTA!";
        document.getElementById('end-title').className = win ? "win-text" : "lose-text";
        document.getElementById('end-subtitle').innerText = `Placar: ${kills} vs ${remoteKills}`;
    }
}

function gameLoop() {
    if(!gameActive) return;

    // Física Jogador
    player.vx = input.x * 8;
    if(input.jump && player.grounded){ player.vy = -18; player.grounded = false; playSound('jump'); }
    player.vy += 0.8; player.x += player.vx; player.y += player.vy;
    if(player.x < 0) player.x = 0; if(player.x > 3950) player.x = 3950;

    player.grounded = false;
    maps[selectedMapIndex].rects.forEach(p => {
        if(player.x + player.w > p.x && player.x < p.x + p.w && player.vy >= 0 && player.y + player.h <= p.y + 10 && player.y + player.h + player.vy >= p.y){
            player.y = p.y - player.h; player.vy = 0; player.grounded = true;
        }
    });

    // Interpolação Rival
    remotePlayer.x += (remotePlayer.targetX - remotePlayer.x) * 0.25;
    remotePlayer.y += (remotePlayer.targetY - remotePlayer.y) * 0.25;

    // Avião e Bombas (Apenas Host controla sorteio)
    if(isHost && !plane.active && Math.random() < 0.002) {
        plane.active = true; plane.x = -500;
        conn.send({type:'plane'});
    }
    if(plane.active) {
        plane.x += 10;
        if(Math.random() < 0.05) bombs.push({x: plane.x + 50, y: 100, vy: 5});
        if(plane.x > 4000) plane.active = false;
    }

    // Tiros e Granadas
    if(input.shoot && Date.now() % 200 < 30) {
        const bvx = player.facing * 20; bullets.push({x: player.x + (player.facing===1?45:0), y: player.y+30, vx: bvx, owner:'me'});
        conn.send({type:'shot', x: player.x+(player.facing===1?45:0), y: player.y+30, v: bvx}); playSound('shoot');
    }
    if(input.grenade && player.grenades > 0 && Date.now() % 500 < 30) {
        player.grenades--; document.getElementById('grenade-count').innerText = player.grenades;
        const g = {x: player.x+20, y: player.y, vx: player.facing*12, vy: -10, timer:60, owner:'me'};
        grenades.push(g); conn.send({type:'grenade', x: g.x, y: g.y, v: g.vx});
    }

    // Lógica Balas
    bullets.forEach((b, i) => {
        b.x += b.vx;
        if(b.owner==='remote' && b.x > player.x && b.x < player.x+45 && b.y > player.y && b.y < player.y+65){
            player.hp -= 10; bullets.splice(i, 1);
        } else if(b.x < 0 || b.x > 4000) bullets.splice(i, 1);
    });

    // Lógica Granadas e Bombas
    [...grenades, ...bombs].forEach((g, i) => {
        if(g.timer !== undefined) { // Granada
            g.x += g.vx; g.y += g.vy; g.vy += 0.5; g.timer--;
            if(g.timer <= 0) {
                playSound('exp');
                if(Math.hypot(player.x - g.x, player.y - g.y) < 150) player.hp -= 40;
                grenades.splice(i, 1);
            }
        } else { // Bomba Avião
            g.y += g.vy;
            if(g.y > 600) { 
                playSound('exp');
                if(Math.hypot(player.x - g.x, player.y - g.y) < 100) player.hp -= 30;
                bombs.splice(i, 1);
            }
        }
    });

    // Itens
    items.forEach((it, i) => {
        if(Math.hypot(player.x - it.x, player.y - it.y) < 50) {
            player.grenades += 3; document.getElementById('grenade-count').innerText = player.grenades;
            items.splice(i, 1); playSound('pickup');
        }
    });

    // Morte
    if(player.hp <= 0) {
        player.hp = 100; player.x = isHost ? 200 : 1500; player.y = 0;
        conn.send({type:'kill'}); kills = kills; // Dummy
    }
    document.getElementById('kill-count').innerText = kills;

    if(Math.abs(player.vx)>0.1){ player.facing=player.vx>0?1:-1; player.anim+=0.2; }
    conn.send({type:'sync', x:player.x, y:player.y, f:player.facing, a:player.anim, h:player.hp});
    draw(); requestAnimationFrame(gameLoop);
}

function draw() {
    const map = maps[selectedMapIndex];
    ctx.fillStyle = map.bg; ctx.fillRect(0,0,V_WIDTH, V_HEIGHT);
    ctx.save();
    let camX = player.x - V_WIDTH/2; camX = Math.max(0, Math.min(camX, 4000-V_WIDTH));
    ctx.translate(-camX, 0);

    map.rects.forEach(p => { ctx.fillStyle = map.plat; ctx.fillRect(p.x, p.y, p.w, p.h); });
    
    // Desenhar Avião
    if(plane.active) {
        ctx.fillStyle = '#34495e'; ctx.fillRect(plane.x, 50, 120, 30);
        ctx.fillRect(plane.x+40, 30, 40, 70);
    }

    items.forEach(it => { ctx.fillStyle = '#2ecc71'; ctx.fillRect(it.x, it.y, 30, 30); ctx.fillStyle='white'; ctx.fillText("G", it.x+10, it.y+20); });
    bombs.forEach(b => { ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(b.x, b.y, 10, 0, 7); ctx.fill(); });
    grenades.forEach(g => { ctx.fillStyle = g.timer % 10 < 5 ? 'red' : 'black'; ctx.beginPath(); ctx.arc(g.x, g.y, 8, 0, 7); ctx.fill(); });

    drawS(player.x, player.y, player.color, player.facing, player.anim, player.hp, "VOCÊ");
    if(remotePlayer.active) drawS(remotePlayer.x, remotePlayer.y, remotePlayer.color, remotePlayer.facing, remotePlayer.anim, remotePlayer.hp, "INIMIGO");

    ctx.fillStyle = '#f1c40f'; bullets.forEach(b => ctx.fillRect(b.x, b.y, 18, 5));
    ctx.restore();
}

function drawS(x, y, color, f, a, h, name) {
    ctx.save();
    ctx.fillStyle = 'white'; ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center'; ctx.fillText(name, x+22, y - 50);
    // Barra de Vida mais ALTA (y - 42)
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(x, y - 42, 45, 8);
    ctx.fillStyle = h > 30 ? '#2ecc71' : '#ff4757'; ctx.fillRect(x, y - 42, 45 * (h / 100), 8);
    ctx.translate(x + 22, y + 32); ctx.scale(f, 1);
    const leg = Math.sin(a) * 14;
    ctx.strokeStyle = '#000'; ctx.lineWidth = 6;
    ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(-leg, 32); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(leg, 32); ctx.stroke();
    ctx.fillStyle = color; ctx.fillRect(-18, -25, 36, 50);
    ctx.fillStyle = '#ffe0bd'; ctx.fillRect(-12, -48, 24, 24);
    ctx.restore();
}
</script>
</body>
</html>
