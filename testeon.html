<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Airborne - Horizontal Pro</title>
    <style>
        /* Impede seleção, menus de contexto e gestos padrão do navegador */
        * {
            -webkit-touch-callout: none; /* iOS Safari */
            -webkit-user-select: none;   /* Safari */
            -user-select: none;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            background: #1e272e; 
            font-family: sans-serif; 
        }

        canvas { display: block; background: #000; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .interactive { pointer-events: auto; }

        #menu-container {
            position: absolute; width: 100%; height: 100%; background: #1e272e;
            z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: auto;
        }

        .panel { 
            background: #2f3640; padding: 15px; border-radius: 15px; 
            border: 2px solid #3498db; text-align: center; color: white; 
            margin-bottom: 10px; width: 85%; max-width: 500px; 
        }

        .btn { 
            padding: 12px; margin: 5px; border: none; border-radius: 8px; 
            font-size: 14px; font-weight: bold; color: #fff; cursor: pointer;
        }
        .btn-p1 { background: #3498db; width: 45%; }
        .btn-p2 { background: #e67e22; width: 45%; }
        .btn-map { background: #7f8c8d; flex: 1; margin: 2px; }
        .btn-map.selected { background: #27ae60; border: 2px solid #fff; }
        
        #rotate-btn {
            background: #9b59b6; width: 90%; padding: 15px; margin-top: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        /* Ajuste dos controles para Horizontal */
        #controls { 
            position: absolute; bottom: 20px; width: 100%; 
            display: none; justify-content: space-between; 
            padding: 0 50px; box-sizing: border-box; 
        }
        
        .control-btn { 
            width: 85px; height: 85px; border-radius: 50%; 
            background: rgba(255,255,255,0.25); color: white; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; border: 3px solid rgba(255,255,255,0.4);
            font-size: 14px;
        }

        #joystick { 
            width: 130px; height: 130px; 
            border: 4px solid rgba(255,255,255,0.5); 
            border-radius: 50%; position: relative; 
            background: rgba(0,0,0,0.2);
        }
        #knob { 
            width: 50px; height: 50px; background: #fff; 
            border-radius: 50%; position: absolute; 
            top: 40px; left: 40px; pointer-events: none; 
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        #stats { 
            position: absolute; top: 10px; left: 10px; color: white; 
            font-family: monospace; background: rgba(0,0,0,0.6); 
            padding: 8px 15px; border-radius: 20px; border: 1px solid #3498db;
        }
    </style>
</head>
<body oncontextmenu="return false;"> <div id="menu-container">
    <h1 style="color: white; margin-bottom: 5px;">ELITE AIRBORNE</h1>
    
    <button id="rotate-btn" class="btn">GIRAR E TELA CHEIA (HORIZONTAL)</button>

    <div class="panel">
        <h3 style="margin: 5px;">MAPA</h3>
        <div style="display: flex; width: 100%;">
            <div id="map-0" class="btn btn-map selected">URBANO</div>
            <div id="map-1" class="btn btn-map">DESERTO</div>
            <div id="map-2" class="btn btn-map">FLORESTA</div>
        </div>
    </div>

    <div class="panel">
        <h3 style="margin: 5px;">BATALHA</h3>
        <div style="display: flex; justify-content: space-around;">
            <div id="p1-btn" class="btn btn-p1">CRIAR SALA</div>
            <div id="p2-btn" class="btn btn-p2">ENTRAR</div>
        </div>
    </div>
    
    <div id="status-display" style="color: #bdc3c7; font-size: 12px;">Recomendado: Use o celular na horizontal</div>
</div>

<div id="ui-layer">
    <div id="stats">MOEDAS: $<span id="coin-count">0</span></div>
    <div id="controls" class="interactive">
        <div id="joystick"><div id="knob"></div></div>
        <div style="display: flex; gap: 30px; align-items: center;">
            <div id="btn-jump" class="control-btn" style="background: rgba(46, 204, 113, 0.5);">PULAR</div>
            <div id="btn-shoot" class="control-btn" style="background: rgba(231, 76, 60, 0.5);">FOGO</div>
        </div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// --- LÓGICA DE TELA CHEIA E ROTAÇÃO ---
document.getElementById('rotate-btn').addEventListener('touchstart', async (e) => {
    e.preventDefault();
    try {
        if (!document.fullscreenElement) {
            await document.documentElement.requestFullscreen();
        }
        if (screen.orientation && screen.orientation.lock) {
            await screen.orientation.lock('landscape');
        }
    } catch (err) {
        console.log("Rotação não suportada ou precisa de interação direta.");
    }
    resizeCanvas();
});

const ID_P1 = "JOGADOR2DUO2026";
const ID_P2 = "AQUISERABOM2026";
let peer, conn, isHost = false, gameActive = false;

const player = { x: 200, y: 0, vx: 0, vy: 0, w: 40, h: 60, facing: 1, anim: 0, color: '#3498db', hp: 100, grounded: false, coins: 0 };
const remotePlayer = { x: 600, y: 0, targetX: 600, targetY: 0, w: 40, h: 60, facing: 1, anim: 0, color: '#e67e22', hp: 100, active: false };
let bullets = [];
let selectedMapIndex = 0;

const maps = [
    { name: 'Urbano', bg: '#2c3e50', plat: '#7f8c8d', rects: [{x: 0, y: 550, w: 3000, h: 200}, {x: 400, y: 400, w: 300, h: 25}, {x: 900, y: 300, w: 300, h: 25}] },
    { name: 'Deserto', bg: '#f1c40f', plat: '#d35400', rects: [{x: 0, y: 550, w: 3000, h: 200}, {x: 200, y: 420, w: 250, h: 25}, {x: 600, y: 320, w: 250, h: 25}] },
    { name: 'Floresta', bg: '#27ae60', plat: '#7e5233', rects: [{x: 0, y: 550, w: 3000, h: 200}, {x: 300, y: 400, w: 400, h: 25}, {x: 800, y: 300, w: 300, h: 25}] }
];

// --- INPUT SISTEMA ---
const input = { x: 0, jump: false, shoot: false };

function handleTouch(e) {
    e.preventDefault(); 
    const touches = e.touches;
    let moveDetected = false;
    input.jump = false;
    input.shoot = false;

    for (let t of touches) {
        const el = document.elementFromPoint(t.clientX, t.clientY);
        if (!el) continue;

        // Menu Logic
        if (!gameActive) {
            if (el.id === 'p1-btn') startPeer(ID_P1, true);
            if (el.id === 'p2-btn') startPeer(ID_P2, false);
            if (el.id.includes('map-')) {
                selectedMapIndex = parseInt(el.id.split('-')[1]);
                updateMapVisual();
            }
        }

        // Joystick Logic
        if (el.id === 'joystick' || el.id === 'knob') {
            const rect = document.getElementById('joystick').getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            input.x = t.clientX < centerX ? -1 : 1;
            document.getElementById('knob').style.transform = `translateX(${input.x * 35}px)`;
            moveDetected = true;
        }
        if (el.id === 'btn-jump') input.jump = true;
        if (el.id === 'btn-shoot') input.shoot = true;
    }
    
    if (!moveDetected) {
        input.x = 0;
        document.getElementById('knob').style.transform = `translateX(0)`;
    }
}

function updateMapVisual() {
    document.querySelectorAll('.btn-map').forEach((b, i) => b.classList.toggle('selected', i === selectedMapIndex));
}

document.addEventListener('touchstart', handleTouch, {passive: false});
document.addEventListener('touchmove', handleTouch, {passive: false});
document.addEventListener('touchend', (e) => {
    if (e.touches.length === 0) {
        input.x = 0;
        document.getElementById('knob').style.transform = `translateX(0)`;
    }
    handleTouch(e);
}, {passive: false});

// --- NETWORK ---
function startPeer(id, host) {
    isHost = host;
    peer = new Peer(id);
    document.getElementById('status-display').innerText = "Conectando rádio...";

    peer.on('open', () => {
        document.getElementById('status-display').innerText = host ? "Sala Aberta. Aguardando..." : "Buscando sala...";
        if (!host) {
            setTimeout(() => {
                conn = peer.connect(ID_P1);
                conn.on('open', setupNetwork);
            }, 500);
        }
    });

    peer.on('connection', (c) => {
        conn = c;
        conn.on('open', () => {
            conn.send({ type: 'map', index: selectedMapIndex });
            setupNetwork();
        });
    });
}

function setupNetwork() {
    conn.on('data', (data) => {
        if (data.type === 'sync') {
            remotePlayer.targetX = data.x; remotePlayer.targetY = data.y;
            remotePlayer.facing = data.facing; remotePlayer.anim = data.anim;
            remotePlayer.hp = data.hp; remotePlayer.active = true;
        }
        if (data.type === 'shoot') bullets.push({ x: data.x, y: data.y, vx: data.vx, owner: 'remote' });
        if (data.type === 'map') selectedMapIndex = data.index;
    });
    document.getElementById('menu-container').style.display = 'none';
    document.getElementById('controls').style.display = 'flex';
    gameActive = true;
    gameLoop();
}

// --- GAME ENGINE ---
function gameLoop() {
    if (!gameActive) return;

    // Player Physics
    player.vx = input.x * 8;
    if (input.jump && player.grounded) { player.vy = -16; player.grounded = false; }
    player.vy += 0.8;
    player.x += player.vx;
    player.y += player.vy;

    // World Bounds
    if (player.x < 0) player.x = 0;
    if (player.x > 3000 - player.w) player.x = 3000 - player.w;

    // Collisions
    player.grounded = false;
    maps[selectedMapIndex].rects.forEach(p => {
        if (player.x + player.w > p.x && player.x < p.x + p.w) {
            if (player.vy >= 0 && player.y + player.h <= p.y + 10 && player.y + player.h + player.vy >= p.y) {
                player.y = p.y - player.h; player.vy = 0; player.grounded = true;
            }
        }
    });

    // Interpolation
    remotePlayer.x += (remotePlayer.targetX - remotePlayer.x) * 0.3;
    remotePlayer.y += (remotePlayer.targetY - remotePlayer.y) * 0.3;

    // Shooting
    if (input.shoot && Date.now() % 250 < 30) {
        const bvx = player.facing * 18;
        const bx = player.x + (player.facing === 1 ? 40 : 0);
        bullets.push({ x: bx, y: player.y + 25, vx: bvx, owner: 'me' });
        conn.send({ type: 'shoot', x: bx, y: player.y + 25, vx: bvx });
    }

    // Bullets logic
    for(let i = bullets.length-1; i >=0; i--){
        let b = bullets[i];
        b.x += b.vx;
        if (b.owner === 'remote' && b.x > player.x && b.x < player.x + 40 && b.y > player.y && b.y < player.y + 60) {
            player.hp -= 10; bullets.splice(i, 1);
            if (player.hp <= 0) { player.hp = 100; player.x = isHost ? 100 : 800; player.y = 0; }
        } else if (b.x < 0 || b.x > 3000) {
            bullets.splice(i, 1);
        }
    }

    if (Math.abs(player.vx) > 0.1) { player.facing = player.vx > 0 ? 1 : -1; player.anim += 0.2; }

    conn.send({ type: 'sync', x: player.x, y: player.y, facing: player.facing, anim: player.anim, hp: player.hp });
    
    draw();
    requestAnimationFrame(gameLoop);
}

function draw() {
    const map = maps[selectedMapIndex];
    ctx.fillStyle = map.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    let camX = player.x - canvas.width / 2;
    camX = Math.max(0, Math.min(camX, 3000 - canvas.width));
    ctx.translate(-camX, 0);

    // Map Platforms
    map.rects.forEach(p => {
        ctx.fillStyle = map.plat;
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.fillRect(p.x, p.y, p.w, 5);
    });

    drawSoldier(player.x, player.y, player.color, player.facing, player.anim, player.hp);
    if (remotePlayer.active) drawSoldier(remotePlayer.x, remotePlayer.y, remotePlayer.color, remotePlayer.facing, remotePlayer.anim, remotePlayer.hp);

    ctx.fillStyle = '#f1c40f';
    bullets.forEach(b => ctx.fillRect(b.x, b.y, 12, 4));
    ctx.restore();
}

function drawSoldier(x, y, color, facing, anim, hp) {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(x, y - 20, 40, 6);
    ctx.fillStyle = hp > 30 ? '#2ecc71' : '#e74c3c'; ctx.fillRect(x, y - 20, 40 * (hp / 100), 6);
    ctx.translate(x + 20, y + 30);
    ctx.scale(facing, 1);
    const leg = Math.sin(anim) * 12;
    ctx.strokeStyle = '#000'; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(-leg, 30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(leg, 30); ctx.stroke();
    ctx.fillStyle = color; ctx.fillRect(-15, -20, 30, 40);
    ctx.fillStyle = '#ffe0bd'; ctx.fillRect(-10, -35, 20, 20);
    ctx.restore();
}
</script>
</body>
</html>
