<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Airborne - Final Warfare</title>
    <style>
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; background: #1e272e; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { display: block; background: #000; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .interactive { pointer-events: auto; }

        #rotate-ui-btn {
            position: absolute; top: 15px; right: 15px; width: 55px; height: 55px;
            background: #8e44ad; border: 3px solid #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; z-index: 1100;
            color: white; font-size: 24px; pointer-events: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        #menu-container, #end-screen {
            position: absolute; width: 100%; height: 100%; background: rgba(30, 39, 46, 0.98);
            z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;
        }

        .panel { background: #2f3640; padding: 15px; border-radius: 15px; border: 2px solid #3498db; text-align: center; margin-bottom: 10px; width: 85%; max-width: 350px; }
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; color: #fff; cursor: pointer; }
        .btn-p1 { background: #3498db; width: 45%; }
        .btn-p2 { background: #e67e22; width: 45%; }
        .btn-map { background: #7f8c8d; flex: 1; margin: 2px; font-size: 10px; }
        .btn-map.selected { background: #27ae60; border: 2px solid #fff; }

        #controls { position: absolute; bottom: 25px; width: 100%; display: none; justify-content: space-between; padding: 0 30px; box-sizing: border-box; align-items: flex-end; }
        .control-btn { width: 75px; height: 75px; border-radius: 50%; background: rgba(255,255,255,0.2); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 3px solid rgba(255,255,255,0.4); margin-bottom: 5px; font-size: 12px; }
        #joystick { width: 120px; height: 120px; border: 4px solid rgba(255,255,255,0.3); border-radius: 50%; position: relative; background: rgba(255,255,255,0.1); }
        #knob { width: 50px; height: 50px; background: #fff; border-radius: 50%; position: absolute; top: 35px; left: 35px; }
        #stats { position: absolute; top: 15px; left: 15px; color: white; background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 20px; font-size: 14px; border: 1px solid #3498db; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="rotate-ui-btn" class="interactive">🔄</div>

<div id="menu-container">
    <h1>ELITE AIRBORNE</h1>
    <div class="panel">
        <h4>MAPA</h4>
        <div style="display: flex;">
            <div id="map-0" class="btn btn-map selected">URBANO</div>
            <div id="map-1" class="btn btn-map">DESERTO</div>
            <div id="map-2" class="btn btn-map">FLORESTA</div>
        </div>
    </div>
    <div class="panel">
        <h4>CONEXÃO</h4>
        <div style="display: flex; justify-content: space-between;">
            <div id="p1-btn" class="btn btn-p1">CRIAR</div>
            <div id="p2-btn" class="btn btn-p2">ENTRAR</div>
        </div>
    </div>
    <div id="status-display">Aguardando...</div>
</div>

<div id="end-screen" style="display: none;">
    <h1 id="end-title">VITÓRIA!</h1>
    <p id="end-msg">Você dominou o campo de batalha.</p>
    <button class="btn btn-p1" onclick="location.reload()">JOGAR NOVAMENTE</button>
</div>

<div id="ui-layer">
    <div id="stats">
        KILLS: <span id="kills">0</span>/4 | 🛡️: <span id="grenade-count">0</span>
    </div>
    <div id="controls" class="interactive">
        <div id="joystick"><div id="knob"></div></div>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <div id="btn-grenade" class="control-btn" style="background: rgba(241, 196, 15, 0.4);">GRANADA</div>
            <div style="display: flex; gap: 15px;">
                <div id="btn-jump" class="control-btn" style="background: rgba(46, 204, 113, 0.4);">PULAR</div>
                <div id="btn-shoot" class="control-btn" style="background: rgba(231, 76, 60, 0.4);">FOGO</div>
            </div>
        </div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const V_WIDTH = 1280, V_HEIGHT = 720;

function resize() {
    const scale = Math.min(window.innerWidth / V_WIDTH, window.innerHeight / V_HEIGHT);
    canvas.width = V_WIDTH * scale; canvas.height = V_HEIGHT * scale;
    ctx.setTransform(scale, 0, 0, scale, 0, 0);
}
window.onresize = resize; resize();

// --- SISTEMA DE ÁUDIO (PROCEDURAL) ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    if(type === 'shoot') { osc.type = 'square'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); }
    if(type === 'jump') { osc.type = 'triangle'; osc.frequency.setValueAtTime(200, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); }
    if(type === 'boom') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5); gain.gain.setValueAtTime(0.2, audioCtx.currentTime); }
    osc.start(); osc.stop(audioCtx.currentTime + (type==='boom'?0.5:0.1));
}

// Botão de Rotação
document.getElementById('rotate-ui-btn').addEventListener('touchstart', (e) => {
    e.preventDefault();
    const btn = e.target;
    btn.style.background = btn.style.background === 'rgb(46, 204, 113)' ? '#8e44ad' : '#2ecc71';
    if(screen.orientation && screen.orientation.lock) {
        if(screen.orientation.type.includes('portrait')) { document.documentElement.requestFullscreen(); screen.orientation.lock('landscape'); }
        else { document.exitFullscreen(); screen.orientation.lock('portrait'); }
    }
});

let peer, conn, gameActive = false;
const player = { x: 200, y: 0, vx: 0, vy: 0, w: 45, h: 65, facing: 1, anim: 0, color: '#3498db', hp: 100, grounded: false, kills: 0, grenades: 2 };
const remotePlayer = { x: 600, y: 0, targetX: 600, targetY: 0, w: 45, h: 65, facing: 1, anim: 0, color: '#e67e22', hp: 100, active: false, kills: 0 };
let bullets = [], grenades = [], mapItems = [], plane = { active: false, x: -500, y: 80, next: Date.now() + 5000 };
let selectedMapIndex = 0;

const maps = [
    { bg: '#2c3e50', plat: '#7f8c8d', rects: [{x: 0, y: 620, w: 4000, h: 100}, {x: 500, y: 450, w: 400, h: 30}, {x: 1200, y: 350, w: 400, h: 30}] },
    { bg: '#d35400', plat: '#e67e22', rects: [{x: 0, y: 620, w: 4000, h: 100}, {x: 300, y: 480, w: 350, h: 30}, {x: 800, y: 380, w: 350, h: 30}] },
    { bg: '#0a3d62', plat: '#3c6382', rects: [{x: 0, y: 620, w: 4000, h: 100}, {x: 400, y: 420, w: 500, h: 30}, {x: 1000, y: 300, w: 400, h: 30}] }
];

const input = { x: 0, jump: false, shoot: false, grenade: false };

function handleInput(e) {
    e.preventDefault();
    let moveX = 0, anyJoy = false; input.jump = input.shoot = input.grenade = false;
    for (let t of e.touches) {
        const el = document.elementFromPoint(t.clientX, t.clientY);
        if(!el) continue;
        if(!gameActive) {
            if(el.id === 'p1-btn') startPeer("JOGADOR2DUO2026", true);
            if(el.id === 'p2-btn') startPeer("AQUISERABOM2026", false);
            if(el.id.includes('map-')) { selectedMapIndex = parseInt(el.id.split('-')[1]); document.querySelectorAll('.btn-map').forEach((b, i) => b.classList.toggle('selected', i === selectedMapIndex)); }
        }
        if(el.id === 'joystick' || el.id === 'knob') {
            const r = document.getElementById('joystick').getBoundingClientRect();
            moveX = t.clientX < (r.left + r.width/2) ? -1 : 1;
            document.getElementById('knob').style.transform = `translateX(${moveX * 30}px)`; anyJoy = true;
        }
        if(el.id === 'btn-jump') input.jump = true;
        if(el.id === 'btn-shoot') input.shoot = true;
        if(el.id === 'btn-grenade') input.grenade = true;
    }
    input.x = moveX; if(!anyJoy) document.getElementById('knob').style.transform = `translateX(0)`;
}

document.addEventListener('touchstart', handleInput, {passive: false});
document.addEventListener('touchmove', handleInput, {passive: false});
document.addEventListener('touchend', (e) => { if(e.touches.length === 0) input.x = 0; handleInput(e); });

function startPeer(id, host) {
    peer = new Peer(id);
    peer.on('open', () => {
        document.getElementById('status-display').innerText = host ? "Aguardando..." : "Conectando...";
        if(!host) { const c = peer.connect("JOGADOR2DUO2026"); c.on('open', () => { conn = c; setupNet(); }); }
    });
    peer.on('connection', (c) => { conn = c; conn.on('open', () => { conn.send({type:'map', i:selectedMapIndex}); setupNet(); })});
}

function setupNet() {
    conn.on('data', d => {
        if(d.type==='sync') { remotePlayer.targetX=d.x; remotePlayer.targetY=d.y; remotePlayer.facing=d.f; remotePlayer.anim=d.a; remotePlayer.hp=d.h; remotePlayer.active=true; remotePlayer.kills=d.k; }
        if(d.type==='shot') { bullets.push({x:d.x, y:d.y, vx:d.v, owner:'remote'}); playSound('shoot'); }
        if(d.type==='map') selectedMapIndex = d.i;
        if(d.type==='grenade') grenades.push({x:d.x, y:d.y, vx:d.v, vy:-10, timer:60, owner:'remote'});
    });
    document.getElementById('menu-container').style.display = 'none';
    document.getElementById('controls').style.display = 'flex';
    gameActive = true; spawnItems(); gameLoop();
}

function spawnItems() {
    for(let i=0; i<3; i++) mapItems.push({x: 600 + i*800, y: 580, type: 'grenade'});
}

function gameLoop() {
    if(!gameActive) return;
    if(player.kills >= 4 || remotePlayer.kills >= 4) {
        gameActive = false;
        document.getElementById('end-screen').style.display = 'flex';
        document.getElementById('end-title').innerText = player.kills >= 4 ? "VITÓRIA!" : "DERROTA";
        return;
    }

    // Física
    player.vx = input.x * 8;
    if(input.jump && player.grounded) { player.vy = -18; player.grounded = false; playSound('jump'); }
    player.vy += 0.8; player.x += player.vx; player.y += player.vy;
    if(player.x < 0) player.x = 0; if(player.x > 3950) player.x = 3950;

    player.grounded = false;
    maps[selectedMapIndex].rects.forEach(p => {
        if(player.x + player.w > p.x && player.x < p.x + p.w) {
            if(player.vy >= 0 && player.y + player.h <= p.y + 10 && player.y + player.h + player.vy >= p.y) { player.y = p.y - player.h; player.vy = 0; player.grounded = true; }
        }
    });

    remotePlayer.x += (remotePlayer.targetX - remotePlayer.x) * 0.25;
    remotePlayer.y += (remotePlayer.targetY - remotePlayer.y) * 0.25;

    // Avião e Bombas
    if(Date.now() > plane.next && !plane.active) { plane.active = true; plane.x = -500; }
    if(plane.active) {
        plane.x += 12;
        if(Math.random() < 0.02) bullets.push({x: plane.x, y: plane.y + 20, vx: 2, vy: 10, type:'bomb', owner:'env'});
        if(plane.x > 4500) { plane.active = false; plane.next = Date.now() + 10000 + Math.random()*10000; }
    }

    // Ações
    if(input.shoot && Date.now() % 250 < 30) {
        const bx = player.x + (player.facing === 1 ? player.w : 0);
        bullets.push({x: bx, y: player.y + 35, vx: player.facing*20, owner:'me'});
        conn.send({type:'shot', x:bx, y:player.y+35, v:player.facing*20}); playSound('shoot');
    }
    if(input.grenade && player.grenades > 0 && Date.now() % 1000 < 30) {
        grenades.push({x: player.x+20, y: player.y, vx: player.facing*12, vy:-12, timer:60, owner:'me'});
        conn.send({type:'grenade', x:player.x+20, y:player.y, v:player.facing*12});
        player.grenades--;
    }

    // Colisões Balas/Bombas
    bullets.forEach((b, i) => {
        b.x += b.vx; if(b.vy) b.y += b.vy;
        if(b.owner !== 'me' && b.x > player.x && b.x < player.x+player.w && b.y > player.y && b.y < player.y+player.h) {
            player.hp -= (b.type==='bomb'?30:10); bullets.splice(i,1);
            if(player.hp <= 0) { player.hp=100; player.x=200; remotePlayer.kills++; }
        } else if(b.x < 0 || b.x > 4000 || b.y > 720) bullets.splice(i,1);
    });

    // Granadas
    grenades.forEach((g, i) => {
        g.vx *= 0.98; g.vy += 0.5; g.x += g.vx; g.y += g.vy; g.timer--;
        if(g.y > 600) { g.y = 600; g.vy *= -0.4; }
        if(g.timer <= 0) {
            playSound('boom');
            let d = Math.hypot(player.x - g.x, player.y - g.y);
            if(d < 150) player.hp -= 50;
            if(g.owner === 'me' && Math.hypot(remotePlayer.x - g.x, remotePlayer.y - g.y) < 150) player.kills++; 
            grenades.splice(i,1);
        }
    });

    // Coleta Itens
    mapItems.forEach((it, i) => {
        if(Math.hypot(player.x - it.x, player.y - it.y) < 50) { player.grenades += 2; mapItems.splice(i,1); setTimeout(() => spawnItems(), 10000); }
    });

    if(Math.abs(player.vx) > 0.1) { player.facing = player.vx > 0 ? 1 : -1; player.anim += 0.2; }
    document.getElementById('kills').innerText = player.kills;
    document.getElementById('grenade-count').innerText = player.grenades;
    conn.send({type:'sync', x:player.x, y:player.y, f:player.facing, a:player.anim, h:player.hp, k:player.kills});
    
    draw();
    requestAnimationFrame(gameLoop);
}

function draw() {
    const map = maps[selectedMapIndex];
    ctx.fillStyle = map.bg; ctx.fillRect(0,0,V_WIDTH, V_HEIGHT);
    ctx.save();
    let camX = Math.max(0, Math.min(player.x - V_WIDTH/2, 4000 - V_WIDTH));
    ctx.translate(-camX, 0);

    map.rects.forEach(p => { ctx.fillStyle = map.plat; ctx.fillRect(p.x, p.y, p.w, p.h); });
    
    // Desenhar Avião
    if(plane.active) { ctx.fillStyle = '#1e272e'; ctx.fillRect(plane.x, plane.y, 100, 20); ctx.fillRect(plane.x+30, plane.y-10, 40, 40); }

    // Desenhar Itens
    mapItems.forEach(it => { ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.arc(it.x, it.y, 15, 0, 7); ctx.fill(); });

    drawS(player.x, player.y, player.color, player.facing, player.anim, player.hp, "VOCÊ");
    if(remotePlayer.active) drawS(remotePlayer.x, remotePlayer.y, remotePlayer.color, remotePlayer.facing, remotePlayer.anim, remotePlayer.hp, "INIMIGO");

    ctx.fillStyle = 'yellow'; bullets.forEach(b => ctx.fillRect(b.x, b.y, b.type==='bomb'?10:15, b.type==='bomb'?20:5));
    ctx.fillStyle = '#e67e22'; grenades.forEach(g => { ctx.beginPath(); ctx.arc(g.x, g.y, 8, 0, 7); ctx.fill(); });
    ctx.restore();
}

function drawS(x, y, color, f, a, h, label) {
    ctx.save();
    // Barra de Vida Subida (y - 45)
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(x, y - 45, 45, 8);
    ctx.fillStyle = h > 30 ? '#2ecc71' : '#ff4757'; ctx.fillRect(x, y - 45, 45 * (h/100), 8);
    ctx.fillStyle = 'white'; ctx.font = 'bold 12px Arial'; ctx.fillText(label, x, y - 52);
    
    ctx.translate(x + 22, y + 32); ctx.scale(f, 1);
    const leg = Math.sin(a) * 14; ctx.strokeStyle = '#000'; ctx.lineWidth = 6;
    ctx.beginPath(); ctx.moveTo(0,10); ctx.lineTo(-leg, 32); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,10); ctx.lineTo(leg, 32); ctx.stroke();
    ctx.fillStyle = color; ctx.fillRect(-18, -25, 36, 50);
    ctx.fillStyle = '#ffe0bd'; ctx.fillRect(-12, -48, 24, 24);
    ctx.restore();
}
</script>
</body>
</html>
