<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Airborne Online - FIX</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1e272e; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        
        /* Menu Principal */
        #menu-container {
            position: absolute; width: 100%; height: 100%; background: #1e272e;
            z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn {
            width: 280px; padding: 20px; margin: 10px; border: none; border-radius: 10px;
            font-size: 20px; font-weight: bold; cursor: pointer; color: #000;
        }
        #p1-btn { background: #f1c40f; }
        #p2-btn { background: #3498db; color: white; }
        #status-display { color: #fff; margin-top: 20px; font-family: monospace; background: rgba(0,0,0,0.5); padding: 10px; }

        /* UI do Jogo */
        #game-ui { position: absolute; top: 10px; left: 10px; color: white; display: none; pointer-events: none; }
        #controls { position: absolute; bottom: 20px; width: 100%; display: none; justify-content: space-between; padding: 0 30px; box-sizing: border-box; }
        .control-btn { width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.2); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; pointer-events: auto; }
        #joystick { width: 120px; height: 120px; border: 2px solid white; border-radius: 50%; position: relative; }
        #knob { width: 50px; height: 50px; background: white; border-radius: 50%; position: absolute; top: 35px; left: 35px; }
    </style>
</head>
<body>

<div id="menu-container">
    <h1 style="color: white;">ELITE AIRBORNE ONLINE</h1>
    <button id="p1-btn" class="btn">SOU JOGADOR 1 (Host)</button>
    <button id="p2-btn" class="btn">SOU JOGADOR 2 (Entrar)</button>
    <div id="status-display">Aguardando comando...</div>
</div>

<div id="game-ui">
    <div>KILLS: <span id="score">0</span></div>
    <div>HP: <span id="health">100</span>%</div>
</div>

<div id="controls">
    <div id="joystick"><div id="knob"></div></div>
    <div style="display: flex; gap: 20px;">
        <div id="btn-jump" class="control-btn" style="background: #27ae60;">PULAR</div>
        <div id="btn-shoot" class="control-btn" style="background: #e74c3c;">FOGO</div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>
const statusText = document.getElementById('status-display');
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Configurações PeerJS
const ID_P1 = "JOGADOR2DUO2026";
const ID_P2 = "AQUISERABOM2026";
let peer, conn;
let isHost = false;
let gameActive = false;

// Estado do Jogo
const player = { x: 100, y: 100, vx: 0, vy: 0, facing: 1, anim: 0, color: '#3498db', grounded: false };
const remotePlayer = { x: 100, y: 100, facing: 1, anim: 0, color: '#e67e22', active: false };
const input = { x: 0, jump: false, shoot: false };
const enemies = [];
const bullets = [];
const camera = { x: 0 };

// --- LÓGICA DE CONEXÃO ---

document.getElementById('p1-btn').addEventListener('click', () => startPeer(ID_P1, true));
document.getElementById('p2-btn').addEventListener('click', () => startPeer(ID_P2, false));

function startPeer(myID, host) {
    isHost = host;
    statusText.innerText = "Iniciando rede... Aguarde.";
    
    // Cria o objeto Peer
    peer = new Peer(myID);

    peer.on('open', (id) => {
        statusText.innerText = "Seu ID está online: " + id;
        if (isHost) {
            statusText.innerText += "\nEsperando Jogador 2 conectar...";
        } else {
            statusText.innerText += "\nTentando conectar ao Jogador 1...";
            tryConnect();
        }
    });

    peer.on('connection', (connection) => {
        conn = connection;
        setupDataHandlers();
    });

    peer.on('error', (err) => {
        console.error(err);
        statusText.innerText = "ERRO: " + err.type + "\nVerifique se o outro jogador já entrou.";
    });
}

function tryConnect() {
    const connection = peer.connect(ID_P1);
    connection.on('open', () => {
        conn = connection;
        setupDataHandlers();
    });
}

function setupDataHandlers() {
    statusText.innerText = "CONECTADO! Carregando mapa...";
    
    conn.on('data', (data) => {
        if (data.type === 'sync') {
            remotePlayer.x = data.x;
            remotePlayer.y = data.y;
            remotePlayer.facing = data.facing;
            remotePlayer.anim = data.anim;
            remotePlayer.active = true;
        }
        if (data.type === 'shoot') {
            bullets.push({ x: data.x, y: data.y, vx: data.vx });
        }
    });

    // Inicia o jogo após um pequeno delay para sincronização
    setTimeout(() => {
        document.getElementById('menu-container').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        document.getElementById('controls').style.display = 'flex';
        gameActive = true;
        gameLoop();
    }, 1000);
}

// --- CONTROLES MOBILE ---

function handleTouch(e) {
    const touches = e.touches;
    input.jump = false;
    input.shoot = false;
    
    for(let i=0; i<touches.length; i++){
        const t = touches[i];
        const el = document.elementFromPoint(t.clientX, t.clientY);
        
        if (el && (el.id === 'joystick' || el.id === 'knob')) {
            const rect = document.getElementById('joystick').getBoundingClientRect();
            const centerX = rect.left + rect.width/2;
            input.x = t.clientX > centerX ? 1 : -1;
            document.getElementById('knob').style.transform = `translateX(${input.x * 30}px)`;
        }
        if (el && el.id === 'btn-jump') input.jump = true;
        if (el && el.id === 'btn-shoot') input.shoot = true;
    }
}

document.addEventListener('touchstart', handleTouch);
document.addEventListener('touchmove', handleTouch);
document.addEventListener('touchend', (e) => {
    if (e.touches.length === 0) {
        input.x = 0;
        document.getElementById('knob').style.transform = `translateX(0)`;
    }
});

// --- LOOP DO JOGO ---

function gameLoop() {
    if (!gameActive) return;

    // Física simples
    player.vx = input.x * 6;
    if (input.jump && player.grounded) { player.vy = -15; player.grounded = false; }
    
    player.vy += 0.8; // gravidade
    player.x += player.vx;
    player.y += player.vy;

    // Chão básico
    if (player.y > canvas.height - 100) {
        player.y = canvas.height - 100;
        player.vy = 0;
        player.grounded = true;
    }

    if (Math.abs(player.vx) > 0.1) {
        player.facing = player.vx > 0 ? 1 : -1;
        player.anim += 0.2;
    }

    // Atirar
    if (input.shoot && Date.now() % 10 < 2) {
        const bx = player.x + (player.facing * 30);
        const bvx = player.facing * 15;
        bullets.push({ x: bx, y: player.y + 20, vx: bvx });
        conn.send({ type: 'shoot', x: bx, y: player.y + 20, vx: bvx });
    }

    // Sincronizar com amigo
    conn.send({
        type: 'sync',
        x: player.x,
        y: player.y,
        facing: player.facing,
        anim: player.anim
    });

    // Balas
    bullets.forEach(b => b.x += b.vx);

    camera.x = player.x - canvas.width/2;

    draw();
    requestAnimationFrame(gameLoop);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-camera.x, 0);

    // Chão
    ctx.fillStyle = '#2d3436';
    ctx.fillRect(0, canvas.height-60, 5000, 60);

    // Jogador Local
    drawSoldier(player.x, player.y, player.color, player.facing, player.anim);

    // Jogador Remoto
    if (remotePlayer.active) {
        drawSoldier(remotePlayer.x, remotePlayer.y, remotePlayer.color, remotePlayer.facing, remotePlayer.anim);
    }

    // Balas
    ctx.fillStyle = '#f1c40f';
    bullets.forEach(b => ctx.fillRect(b.x, b.y, 15, 5));

    ctx.restore();
}

function drawSoldier(x, y, color, facing, anim) {
    ctx.save();
    ctx.translate(x + 20, y + 30);
    ctx.scale(facing, 1);
    
    // Pernas (animação simples)
    const legMove = Math.sin(anim) * 10;
    ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(-legMove, 30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(legMove, 30); ctx.stroke();

    // Corpo
    ctx.fillStyle = color;
    ctx.fillRect(-15, -20, 30, 40);
    // Cabeça
    ctx.fillStyle = '#ffe0bd';
    ctx.fillRect(-10, -35, 20, 20);
    
    ctx.restore();
}
</script>
</body>
</html>
