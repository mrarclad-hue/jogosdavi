<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Adventure - A Carona</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #ui {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white;
            padding: 15px; border: 4px solid #fff; border-radius: 0;
            text-align: center; pointer-events: none;
        }
        #instructions {
            position: absolute; top: 10px; width: 100%;
            text-align: center; color: white; text-shadow: 2px 2px #000;
        }
    </style>
</head>
<body>

<div id="instructions"><h1>VOXEL DRIVE</h1></div>
<div id="ui">
    <p id="dialogo">Aguarde na beira da estrada...</p>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';

    // Configurações Básicas
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // Céu azul
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: false }); // Pixelado style
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Iluminação estilo Minecraft
    const light = new THREE.DirectionalLight(0xffffff, 1.2);
    light.position.set(5, 10, 7.5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    // Materiais (Cores sólidas e quadradas)
    const matGrama = new THREE.MeshLambertMaterial({ color: 0x4CAF50 });
    const matEstrada = new THREE.MeshLambertMaterial({ color: 0x333333 });
    const matCarro = new THREE.MeshLambertMaterial({ color: 0xff0000 });
    const matPele = new THREE.MeshLambertMaterial({ color: 0xffdbac });
    const matCasa = new THREE.MeshLambertMaterial({ color: 0x8B4513 });

    // Mundo: Chão de Grama
    const groundGeo = new THREE.BoxGeometry(1000, 1, 1000);
    const ground = new THREE.Mesh(groundGeo, matGrama);
    ground.position.y = -0.5;
    scene.add(ground);

    // Estrada
    const roadGeo = new THREE.BoxGeometry(10, 1.1, 1000);
    const road = new THREE.Mesh(roadGeo, matEstrada);
    scene.add(road);

    // Personagem (Você) - Representado pela Câmera
    camera.position.set(8, 2, 50); // Na beira da estrada

    // O Carro do Moço (Voxel Style)
    const carGroup = new THREE.Group();
    
    // Corpo do carro
    const body = new THREE.Mesh(new THREE.BoxGeometry(4, 2, 6), matCarro);
    carGroup.add(body);
    // Teto
    const roof = new THREE.Mesh(new THREE.BoxGeometry(3.5, 1.5, 3), matCarro);
    roof.position.y = 1.75;
    roof.position.z = -1;
    carGroup.add(roof);

    // O Motorista (Cabeça Quadrada)
    const driverHead = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), matPele);
    driverHead.position.set(0.8, 2, -1);
    carGroup.add(driverHead);

    carGroup.position.set(0, 1, -100);
    scene.add(carGroup);

    // A Casa (Longe no destino)
    const houseGroup = new THREE.Group();
    const walls = new THREE.Mesh(new THREE.BoxGeometry(10, 10, 10), matCasa);
    const roofHouse = new THREE.Mesh(new THREE.BoxGeometry(12, 2, 12), new THREE.MeshLambertMaterial({color: 0x555555}));
    roofHouse.position.y = 6;
    houseGroup.add(walls);
    houseGroup.add(roofHouse);
    houseGroup.position.set(50, 5, 200);
    scene.add(houseGroup);

    // Lógica de Animação e História
    let etapa = 0;
    const dialogo = document.getElementById('dialogo');
    let carSpeed = 0.5;
    let cameraNoCarro = false;

    function animate() {
        requestAnimationFrame(animate);

        // Fase 1: Carro se aproxima
        if (etapa === 0) {
            carGroup.position.z += carSpeed;
            if (carGroup.position.z >= 45) {
                carSpeed = 0;
                etapa = 1;
                dialogo.innerText = "Motorista: 'Ei quadrado! Quer carona até sua casa?'";
                setTimeout(() => {
                    dialogo.innerText = "Você subiu no carro!";
                    cameraNoCarro = true;
                    etapa = 2;
                }, 3000);
            }
        }

        // Fase 2: Dirigindo
        if (etapa === 2) {
            carSpeed = 0.8;
            carGroup.position.z += carSpeed;
            dialogo.innerText = "Vrum vrum... Indo para casa.";

            if (carGroup.position.z >= 190) {
                carSpeed = 0;
                carGroup.rotation.y = Math.PI / 2; // Vira para a casa
                etapa = 3;
            }
        }

        if (etapa === 3) {
            carGroup.position.x += 0.3;
            if (carGroup.position.x >= 35) {
                etapa = 4;
                dialogo.innerText = "Motorista: 'Chegamos! Lar doce lar de blocos.'";
                cameraNoCarro = false;
            }
        }

        // Câmera segue o carro se estiver nele
        if (cameraNoCarro) {
            camera.position.x = carGroup.position.x + 5;
            camera.position.y = carGroup.position.y + 3;
            camera.position.z = carGroup.position.z - 2;
            camera.lookAt(carGroup.position);
        } else if (etapa === 4) {
            camera.position.lerp(new THREE.Vector3(45, 5, 180), 0.05);
            camera.lookAt(houseGroup.position);
        }

        renderer.render(scene, camera);
    }

    // Ajuste de tela
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
