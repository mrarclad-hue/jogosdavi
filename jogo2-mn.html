<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft 3D - Mobile Edition</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; background: #000; }
        
        /* Interface Minecraft (HUD) */
        #hud {
            position: absolute; bottom: 10px; left: 50%;
            transform: translateX(-50%); width: 360px; pointer-events: none;
            display: flex; flex-direction: column; align-items: center;
        }
        .stats-bar { display: flex; justify-content: space-between; width: 100%; margin-bottom: 5px; }
        .hearts, .food { display: flex; gap: 2px; }
        .heart { width: 18px; height: 18px; background: #ff4757; border: 2px solid #000; }
        .meat { width: 18px; height: 18px; background: #a0522d; border: 2px solid #000; border-radius: 0 0 5px 5px; }
        
        #hotbar {
            width: 360px; height: 40px; background: rgba(0,0,0,0.5);
            border: 4px solid #333; display: flex; gap: 4px; padding: 2px;
        }
        .slot { width: 36px; height: 36px; background: rgba(255,255,255,0.2); border: 2px solid #888; }
        .slot.active { border-color: #fff; box-shadow: inset 0 0 5px #fff; }

        /* Controles */
        #controls {
            position: absolute; bottom: 20px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box;
        }
        .btn {
            width: 60px; height: 60px; background: rgba(255,255,255,0.2);
            border: 2px solid #fff; color: white; display: flex;
            align-items: center; justify-content: center; font-weight: bold;
            pointer-events: auto; user-select: none;
        }
        #btn-action { width: 100px; background: #2ed573; }
        #btn-view { width: 50px; height: 50px; position: absolute; top: 20px; right: 20px; }
    </style>
</head>
<body>

<div id="hud">
    <div class="stats-bar">
        <div class="hearts" id="hp-bar"></div>
        <div class="food" id="food-bar"></div>
    </div>
    <div id="hotbar">
        <div class="slot active"></div><div class="slot"></div><div class="slot"></div>
        <div class="slot"></div><div class="slot"></div><div class="slot"></div>
        <div class="slot"></div><div class="slot"></div><div class="slot"></div>
    </div>
</div>

<div id="btn-view" class="btn">CAM</div>

<div id="controls">
    <div style="display: grid; grid-template-columns: repeat(3, 65px); gap: 5px;">
        <div></div><div class="btn" id="up">↑</div><div></div>
        <div class="btn" id="left">←</div><div class="btn" id="down">↓</div><div class="btn" id="right">→</div>
    </div>
    <div class="btn" id="btn-action">ENTRAR</div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- SETUP ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const sun = new THREE.DirectionalLight(0xffffff, 0.8);
    sun.position.set(10, 50, 10);
    scene.add(sun);

    // --- INTERFACE HUD DINÂMICA ---
    const hpBar = document.getElementById('hp-bar');
    const foodBar = document.getElementById('food-bar');
    for(let i=0; i<10; i++) {
        hpBar.innerHTML += '<div class="heart"></div>';
        foodBar.innerHTML += '<div class="meat"></div>';
    }

    // --- MUNDO QUADRADO ---
    const matGrass = new THREE.MeshLambertMaterial({ color: 0x559022 });
    const ground = new THREE.Mesh(new THREE.BoxGeometry(1000, 1, 1000), matGrass);
    ground.position.y = -0.5;
    scene.add(ground);

    // Casa Detalhada
    const house = new THREE.Group();
    const createRoom = (w, d, x, z, color) => {
        const floor = new THREE.Mesh(new THREE.BoxGeometry(w, 0.2, d), new THREE.MeshLambertMaterial({color}));
        floor.position.set(x, 0.1, z);
        house.add(floor);
    };
    createRoom(10, 10, -5, -5, 0x7f8c8d); // Sala
    createRoom(10, 10, 5, -5, 0x95a5a6);  // Cozinha
    createRoom(10, 10, -5, 5, 0x34495e);  // Quarto
    
    // Paredes
    const wallMat = new THREE.MeshLambertMaterial({ color: 0xd2b48c });
    const wall = new THREE.Mesh(new THREE.BoxGeometry(20, 6, 0.5), wallMat);
    wall.position.set(0, 3, 10); house.add(wall); // Parede fundo
    
    house.position.set(30, 0, 50);
    scene.add(house);

    // --- VEÍCULO ---
    const car = new THREE.Group();
    const carBody = new THREE.Mesh(new THREE.BoxGeometry(4, 1.8, 6), new THREE.MeshLambertMaterial({color: 0x222222}));
    carBody.position.y = 1;
    car.add(carBody);
    car.position.set(0, 0, 20);
    scene.add(car);

    // --- BONECO (PLAYER) ---
    const player = new THREE.Group();
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshLambertMaterial({color: 0xffdbac}));
    const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.4, 0.6), new THREE.MeshLambertMaterial({color: 0x3498db}));
    body.position.y = -1.1;
    player.add(head, body);
    player.position.set(5, 2.5, 10);
    scene.add(player);

    // --- CONTROLES E LÓGICA ---
    let state = { driving: false, firstPerson: false };
    let move = { w: false, s: false, a: false, d: false };
    let velocity = 0;

    const toggleAction = () => {
        if (!state.driving) {
            if (player.position.distanceTo(car.position) < 6) {
                state.driving = true;
                player.visible = false;
                document.getElementById('btn-action').innerText = "SAIR";
            }
        } else {
            state.driving = false;
            player.visible = true;
            player.position.set(car.position.x + 5, 2.5, car.position.z);
            document.getElementById('btn-action').innerText = "ENTRAR";
        }
    };

    document.getElementById('btn-action').addEventListener('click', toggleAction);
    document.getElementById('btn-view').addEventListener('click', () => {
        state.firstPerson = !state.firstPerson;
    });

    // Eventos Mobile
    const bind = (id, k) => {
        const el = document.getElementById(id);
        el.onpointerdown = () => move[k] = true;
        el.onpointerup = () => move[k] = false;
    };
    bind('up','w'); bind('down','s'); bind('left','a'); bind('right','d');

    // Teclado
    window.onkeydown = (e) => {
        const k = e.key.toLowerCase();
        if(k === 'w' || k === 'arrowup') move.w = true;
        if(k === 's' || k === 'arrowdown') move.s = true;
        if(k === 'a' || k === 'arrowleft') move.a = true;
        if(k === 'd' || k === 'arrowright') move.d = true;
        if(e.code === 'Space') toggleAction();
        if(k === 'v') state.firstPerson = !state.firstPerson;
    };
    window.onkeyup = (e) => {
        const k = e.key.toLowerCase();
        if(k === 'w' || k === 'arrowup') move.w = false;
        if(k === 's' || k === 'arrowdown') move.s = false;
        if(k === 'a' || k === 'arrowleft') move.a = false;
        if(k === 'd' || k === 'arrowright') move.d = false;
    };

    function animate() {
        requestAnimationFrame(animate);
        const target = state.driving ? car : player;

        // Movimentação
        if (move.w) velocity += 0.02;
        if (move.s) velocity -= 0.02;
        if (move.a) target.rotation.y += 0.04;
        if (move.d) target.rotation.y -= 0.04;
        
        velocity *= 0.9;
        target.translateZ(velocity);

        // Câmera
        if (state.firstPerson) {
            camera.position.copy(player.position);
            camera.rotation.copy(player.rotation);
        } else {
            const offset = new THREE.Vector3(0, 10, -15).applyMatrix4(target.matrixWorld);
            camera.position.lerp(offset, 0.1);
            camera.lookAt(target.position);
        }

        renderer.render(scene, camera);
    }

    animate();
    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
